<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Start - AI Cleaner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: radial-gradient(circle at top right, #111827, #000000); min-height: 100vh; font-family: 'Pretendard', sans-serif; color: #e5e7eb; }
        .glass-card { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .log-container::-webkit-scrollbar { width: 4px; }
        .log-container::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .pulse-green { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="max-w-xl w-full glass-card rounded-3xl p-8 shadow-2xl">
        <div class="mb-8 text-center">
            <span class="text-4xl mb-4 block">🧹</span>
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500 uppercase tracking-tight">AI Data Purifier</h1>
            <p class="text-gray-400 text-sm mt-2">무질서한 로그를 전략적 데이터로 정제합니다.</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Gemini API Key</label>
                <input type="password" id="geminiKey" 
                    class="w-full bg-gray-900/50 border border-gray-700 rounded-2xl p-4 text-sm focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all placeholder:text-gray-600" 
                    placeholder="AI Studio에서 발급받은 키를 넣어주세요">
            </div>
            
            <button id="cleanBtn" 
                class="w-full bg-gradient-to-r from-green-600 to-green-700 hover:from-green-500 hover:to-green-600 text-white font-bold py-5 rounded-2xl transition-all transform active:scale-[0.98] shadow-lg shadow-green-900/20">
                정원 청소 시작하기
            </button>
        </div>

        <div id="statusBox" class="mt-10 hidden transition-all duration-500">
            <div class="flex items-center justify-between mb-3 px-1">
                <span id="progressText" class="text-xs font-bold text-green-400 flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full pulse-green"></span>
                    준비 중...
                </span>
                <span id="countText" class="text-[10px] text-gray-500 font-mono">0/0</span>
            </div>
            
            <div class="log-container w-full h-48 bg-black/40 rounded-2xl border border-gray-800 p-4 overflow-y-auto text-[11px] font-mono leading-relaxed text-gray-400" id="logBox">
                <div class="text-gray-600 italic">연결 대기 중...</div>
            </div>
        </div>
    </div>

    <script>
        // 1. 슈파베이스 설정 (사용자님 정보로 채워주세요)
        const SUPABASE_URL = "https://rcsicidesepmprytnyge.supabase.co";
        const SUPABASE_KEY = "sb_publishable_m5OZH8qVZdBD8N_EBYU3mw_L2AhObjN";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const cleanBtn = document.getElementById('cleanBtn');
        const progressText = document.getElementById('progressText');
        const logBox = document.getElementById('logBox');
        const statusBox = document.getElementById('statusBox');
        const countText = document.getElementById('countText');
        const MODEL_CANDIDATES = ['gemini-2.0-flash', 'gemini-2.0-flash-lite', 'gemini-1.5-flash'];

        const resolveModelId = async (key) => {
            const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            const listData = await listRes.json();
            if (listData.error) throw new Error(listData.error.message || "모델 목록 조회 실패");

            const models = listData.models || [];
            const available = new Set(
                models
                    .filter(m => (m.supportedGenerationMethods || []).includes('generateContent'))
                    .map(m => (m.name || '').replace('models/', ''))
            );

            const selected = MODEL_CANDIDATES.find(m => available.has(m));
            if (!selected) throw new Error("generateContent를 지원하는 호환 모델을 찾지 못했습니다.");
            return selected;
        };

        // 저장된 API Key 불러오기
        document.getElementById('geminiKey').value = localStorage.getItem("gemini_api_key") || "";

        cleanBtn.onclick = async () => {
            const apiKey = document.getElementById('geminiKey').value;
            if (!apiKey) return alert("API Key를 입력해주세요!");

            localStorage.setItem("gemini_api_key", apiKey);
            statusBox.classList.remove('hidden');
            cleanBtn.disabled = true;
            cleanBtn.innerText = "청소 진행 중...";
            logBox.innerHTML = "<div class='text-blue-400'>[SYSTEM] 정원 분석을 시작합니다...</div>";

            try {
                // [한글 컬럼 매칭 로직]
                const { data: tasks, error } = await supabaseClient
                    .from('tasks') // ⚠️ 테이블 이름 확인!
                    .select('ID, 내용, milestone')
                    .or('milestone.is.null, milestone.eq.""');

                if (error) throw error;

                if (!tasks || tasks.length === 0) {
                    progressText.innerText = "정원이 이미 깨끗합니다.";
                    logBox.innerHTML += "<div class='text-green-500 mt-2'>[SUCCESS] 청소할 잡초가 없습니다!</div>";
                    return;
                }

                progressText.innerText = "AI가 나무에 이름표를 붙이는 중...";
                let completed = 0;
                countText.innerText = `${completed}/${tasks.length}`;
                const modelId = await resolveModelId(apiKey);

                for (let task of tasks) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({ contents: [{ parts: [{ text: `너는 커리어 전문가야. 다음 내용을 읽고 P1(분석), P2(문서), P3(훈련), P4(제출) 중 하나로 분류해. 기호만 답해. 내용: "${task["내용"]}"` }] }] })
                        });

                        const resData = await response.json();
                        
                        if (resData.error) throw new Error(resData.error.message);

                        const milestone = resData.candidates?.[0]?.content?.parts?.[0]?.text?.trim().substring(0,2);
                        if (!milestone) continue;

                        await supabaseClient
                            .from('tasks') // ⚠️ 테이블 이름 확인!
                            .update({ "milestone": milestone })
                            .eq('ID', task["ID"]);

                        completed++;
                        countText.innerText = `${completed}/${tasks.length}`;
                        
                        const line = document.createElement('div');
                        line.className = "py-1 border-b border-gray-800/50 last:border-0";
                        line.innerHTML = `<span class="text-green-500 font-bold">DONE</span> <span class="text-gray-300">${task["내용"].substring(0,12)}...</span> <span class="text-blue-400">→ ${milestone}</span>`;
                        logBox.prepend(line);
                        
                    } catch (e) {
                        console.error(e);
                    }
                }

                progressText.innerText = "청소 완료!";
                logBox.innerHTML = "<div class='text-yellow-400 font-bold mb-2'>[COMPLETE] 정원이 말끔하게 정리되었습니다!</div>" + logBox.innerHTML;
            } catch (e) {
                progressText.innerText = "오류 발생";
                logBox.innerHTML += `<div class='text-red-500 mt-2'>[ERROR] ${e.message}</div>`;
            } finally {
                cleanBtn.disabled = false;
                cleanBtn.innerText = "다시 청소하기";
            }
        };
    </script>
</body>
</html>
