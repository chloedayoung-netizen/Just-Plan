<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Start - Strategy Map Preview</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; font-family: 'Pretendard', sans-serif; color: white; }
        .glass-panel { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(16px); border: 1px solid #27272a; }
        .bar-track { background: #18181b; border-radius: 12px; border: 1px solid #27272a; }
        .tab-active { background: #27272a; border-color: #52525b; color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.05); }
        .tab-inactive { background: #09090b; border-color: #27272a; color: #71717a; }
        .tab-inactive:hover { background: #18181b; color: #a1a1aa; }
        .progress-bar { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="p-10 flex justify-center min-h-screen items-start">

    <div id="root" class="w-full max-w-5xl"></div>

    <script type="text/babel">
        const { useState } = React;

        // [프리뷰용 가짜 데이터] 실제로는 엑셀/슈파베이스에서 가져올 값들입니다.
        const MOCK_DATA = {
            "구직 / 세일즈포스": {
                currentDay: 5,
                message: "현재 5일차, 문서 저격(P2) 단계입니다. 핵심 성과 수치화에 집중하세요!",
                p1: { total: 4, done: 4, percent: 100 }, // 100% 완료
                p2: { total: 6, done: 3, percent: 50 },  // 절반 진행
                p3: { total: 2, done: 0, percent: 0 },   // 대기
                p4: { total: 1, done: 0, percent: 0 }    // 대기
            },
            "구직 / 채널톡": {
                currentDay: 2,
                message: "이제 막 채널톡 여정을 시작하셨군요! 이력서 매칭(P1) 단계부터 꼼꼼히 다지세요.",
                p1: { total: 3, done: 1, percent: 33 },  // 막 시작함
                p2: { total: 0, done: 0, percent: 0 },
                p3: { total: 0, done: 0, percent: 0 },
                p4: { total: 0, done: 0, percent: 0 }
            },
            "학습 / 지피터스": {
                currentDay: 8,
                message: "거의 다 왔습니다! 실전 훈련(P3) 마무리 후 최종 배포(P4)를 준비하세요.",
                p1: { total: 2, done: 2, percent: 100 },
                p2: { total: 4, done: 4, percent: 100 },
                p3: { total: 5, done: 4, percent: 80 },  // 훈련 거의 완료
                p4: { total: 1, done: 0, percent: 0 }
            }
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState("구직 / 세일즈포스");
            const data = MOCK_DATA[activeTab];

            return (
                <div className="animate-fade-in">
                    {/* 1. 작전 선택 탭 (Tabs) */}
                    <div className="flex gap-3 mb-10 overflow-x-auto pb-2">
                        {Object.keys(MOCK_DATA).map(tab => (
                            <button 
                                key={tab}
                                onClick={() => setActiveTab(tab)}
                                className={`px-6 py-3 rounded-2xl font-bold text-sm border transition-all duration-300 flex-shrink-0 flex items-center gap-2 ${activeTab === tab ? 'tab-active' : 'tab-inactive'}`}
                            >
                                <span className={activeTab === tab ? 'text-green-400' : 'text-zinc-600'}>
                                    {tab.includes('구직') ? '🎯' : '📚'}
                                </span>
                                {tab}
                            </button>
                        ))}
                    </div>

                    {/* 2. 헤더 영역 */}
                    <header className="flex justify-between items-end mb-8">
                        <div>
                            <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-zinc-100 to-zinc-500 mb-2">
                                Strategy Map
                            </h1>
                            <p className="text-zinc-400 text-sm">현재 <strong className="text-white">{activeTab}</strong> 프로젝트의 10일 전략 진척도입니다.</p>
                        </div>
                        <div className="text-right">
                            <p className="text-zinc-500 text-[10px] tracking-widest uppercase font-bold mb-1">Timeline Status</p>
                            <p className="text-yellow-400 text-3xl font-bold font-mono">Day {data.currentDay} / 10</p>
                        </div>
                    </header>

                    {/* 3. 간트 차트 영역 */}
                    <div className="glass-panel rounded-[2rem] p-10 relative shadow-2xl overflow-hidden">
                        
                        {/* TODAY 기준선 */}
                        <div className="absolute top-0 bottom-0 border-l border-dashed border-yellow-400/50 z-20 transition-all duration-700" style={{ left: `${(data.currentDay / 10) * 100}%` }}>
                            <div className="bg-yellow-400 text-black text-[9px] font-black px-2 py-0.5 rounded absolute top-4 -translate-x-1/2">TODAY</div>
                        </div>

                        {/* 날짜 눈금자 */}
                        <div className="grid grid-cols-10 mb-8 ml-[20%] relative z-10 text-center text-[10px] text-zinc-600 font-mono font-bold uppercase">
                            {[...Array(10)].map((_, i) => <div key={i}>Day {i+1}</div>)}
                        </div>

                        {/* 타임라인 바 (P1 ~ P4) */}
                        <div className="space-y-6 relative z-10">
                            
                            {/* P1: 전략 분석 (Day 1~2) */}
                            <div className="flex items-center">
                                <div className="w-[20%] pr-4">
                                    <div className="flex items-center gap-2 mb-1">
                                        <span className={`text-[10px] px-2 py-1 rounded font-bold ${data.p1.percent === 100 ? 'bg-green-900/40 text-green-400' : 'bg-zinc-800 text-zinc-400'}`}>P1</span>
                                        <span className="font-bold text-sm text-zinc-200">전략 분석</span>
                                    </div>
                                    <p className="text-[10px] text-zinc-500">{data.p1.total}개 행동 ({data.p1.done} 완료)</p>
                                </div>
                                <div className="w-[80%] bar-track h-10 relative">
                                    <div className="absolute left-0 w-[20%] h-full bg-green-500/10 rounded-xl overflow-hidden">
                                        <div className="h-full bg-green-500 progress-bar relative" style={{ width: `${data.p1.percent}%` }}>
                                            {data.p1.percent === 100 && <span className="absolute right-3 top-2.5 text-xs">✅</span>}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* P2: 문서 저격 (Day 3~5) */}
                            <div className="flex items-center">
                                <div className="w-[20%] pr-4">
                                    <div className="flex items-center gap-2 mb-1">
                                        <span className={`text-[10px] px-2 py-1 rounded font-bold ${data.p2.percent > 0 ? 'bg-blue-900/40 text-blue-400' : 'bg-zinc-800 text-zinc-500'}`}>P2</span>
                                        <span className="font-bold text-sm text-zinc-200">문서 저격</span>
                                    </div>
                                    <p className="text-[10px] text-zinc-500">{data.p2.total}개 행동 ({data.p2.done} 완료)</p>
                                </div>
                                <div className="w-[80%] bar-track h-10 relative">
                                    <div className="absolute left-[20%] w-[30%] h-full bg-blue-500/10 rounded-xl overflow-hidden">
                                        <div className="h-full bg-blue-500 progress-bar shadow-[0_0_15px_rgba(59,130,246,0.3)]" style={{ width: `${data.p2.percent}%` }}></div>
                                    </div>
                                </div>
                            </div>

                            {/* P3: 실전 훈련 (Day 6~8) */}
                            <div className="flex items-center">
                                <div className="w-[20%] pr-4">
                                    <div className="flex items-center gap-2 mb-1">
                                        <span className={`text-[10px] px-2 py-1 rounded font-bold ${data.p3.percent > 0 ? 'bg-orange-900/40 text-orange-400' : 'bg-zinc-800 text-zinc-500'}`}>P3</span>
                                        <span className="font-bold text-sm text-zinc-300">실전 훈련</span>
                                    </div>
                                    <p className="text-[10px] text-zinc-500">{data.p3.total}개 행동 ({data.p3.done} 완료)</p>
                                </div>
                                <div className="w-[80%] bar-track h-10 relative">
                                    <div className="absolute left-[50%] w-[30%] h-full bg-orange-500/10 rounded-xl overflow-hidden">
                                        <div className="h-full bg-orange-500 progress-bar" style={{ width: `${data.p3.percent}%` }}></div>
                                    </div>
                                </div>
                            </div>

                            {/* P4: 최종 제출 (Day 9~10) */}
                            <div className="flex items-center">
                                <div className="w-[20%] pr-4">
                                    <div className="flex items-center gap-2 mb-1">
                                        <span className={`text-[10px] px-2 py-1 rounded font-bold ${data.p4.percent > 0 ? 'bg-red-900/40 text-red-400' : 'bg-zinc-800 text-zinc-500'}`}>P4</span>
                                        <span className="font-bold text-sm text-zinc-400">최종 제출</span>
                                    </div>
                                    <p className="text-[10px] text-zinc-500">{data.p4.total}개 행동 ({data.p4.done} 완료)</p>
                                </div>
                                <div className="w-[80%] bar-track h-10 relative">
                                    <div className="absolute left-[80%] w-[20%] h-full bg-red-500/10 rounded-xl overflow-hidden">
                                        <div className="h-full bg-red-500 progress-bar" style={{ width: `${data.p4.percent}%` }}></div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    {/* 4. PO 어드바이스 패널 */}
                    <div className="mt-6 glass-panel rounded-2xl p-6 flex items-center gap-5 border-l-4 border-green-500">
                        <span className="text-3xl bg-zinc-800/50 p-3 rounded-xl">🚀</span>
                        <div>
                            <p className="text-green-400 text-xs font-bold mb-1 uppercase tracking-wider">시니어 PO의 코칭</p>
                            <p className="text-sm text-zinc-300 leading-relaxed">{data.message}</p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
