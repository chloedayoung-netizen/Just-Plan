<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Start - Dashboard Preview</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; font-family: 'Pretendard', sans-serif; color: white; }
        .glass-panel { background: rgba(15, 15, 15, 0.9); border: 1px solid #27272a; border-radius: 24px; }
        .bar-track { background: #18181b; border-radius: 8px; border: 1px solid #27272a; }
        .tab-active { background: #fff; color: #000; }
        .tab-inactive { background: #18181b; color: #71717a; border: 1px solid #27272a; }
    </style>
</head>
<body class="p-8 flex justify-center min-h-screen">
    <div id="root" class="w-full max-w-6xl"></div>

    <script type="text/babel">
        const { useState } = React;

        // 날짜 포맷팅 함수 (MM/DD)
        const getFormatDate = (startDateStr, dayOffset) => {
            const date = new Date(startDateStr);
            date.setDate(date.getDate() + dayOffset);
            return `${date.getMonth() + 1}/${date.getDate()}`;
        };

        const MOCK_DATA = {
            "구직": [
                {
                    name: "세일즈포스",
                    startDate: "2026-02-04",
                    currentDay: 5,
                    p1: { percent: 100, done: 4 }, p2: { percent: 50, done: 3 }, p3: { percent: 0, done: 0 }, p4: { percent: 0, done: 0 }
                },
                {
                    name: "채널톡",
                    startDate: "2026-02-11",
                    currentDay: 2,
                    p1: { percent: 30, done: 1 }, p2: { percent: 0, done: 0 }, p3: { percent: 0, done: 0 }, p4: { percent: 0, done: 0 }
                },
                {
                    name: "번개장터",
                    startDate: "2026-02-16",
                    currentDay: 1,
                    p1: { percent: 0, done: 0 }, p2: { percent: 0, done: 0 }, p3: { percent: 0, done: 0 }, p4: { percent: 0, done: 0 }
                }
            ],
            "학습": [
                {
                    name: "지피터스 AI",
                    startDate: "2026-01-20",
                    currentDay: 15, // 오랫동안 진행된 프로젝트
                    p1: { percent: 100, done: 2 }, p2: { percent: 100, done: 4 }, p3: { percent: 80, done: 4 }, p4: { percent: 0, done: 0 }
                }
            ]
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState("구직");
            const projects = MOCK_DATA[activeTab];

            return (
                <div className="pb-20">
                    {/* 1. 최상단 대카테고리 탭 */}
                    <div className="flex gap-4 mb-8">
                        {Object.keys(MOCK_DATA).map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} 
                                className={`px-8 py-3 rounded-full font-black text-sm transition-all ${activeTab === tab ? 'tab-active' : 'tab-inactive'}`}>
                                {tab}
                            </button>
                        ))}
                    </div>

                    <header className="mb-10">
                        <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-zinc-200 to-zinc-600 mb-2">
                            Strategy Dashboard
                        </h1>
                        <p className="text-zinc-500 text-sm">현재 <strong className="text-zinc-300">{activeTab}</strong> 카테고리 내 모든 프로젝트의 진행 상황입니다.</p>
                    </header>

                    {/* 2. 프로젝트 리스트 (한 화면에 3개씩) */}
                    <div className="space-y-8">
                        {projects.map((proj, idx) => (
                            <div key={idx} className="glass-panel p-8 relative overflow-hidden">
                                
                                {/* 프로젝트 타이틀 & TODAY */}
                                <div className="flex justify-between items-center mb-6 border-b border-zinc-800 pb-4">
                                    <h2 className="text-xl font-black text-white flex items-center gap-2">
                                        <span className="w-3 h-3 rounded-full bg-green-500"></span>
                                        {proj.name}
                                    </h2>
                                    <div className="text-right">
                                        <span className="bg-yellow-400 text-black text-[10px] font-black px-2 py-1 rounded">DAY {proj.currentDay}</span>
                                        <p className="text-zinc-500 text-[10px] mt-1">시작일: {proj.startDate}</p>
                                    </div>
                                </div>

                                {/* 타임라인 헤더 (실제 날짜 포함) */}
                                <div className="grid grid-cols-10 mb-4 ml-[15%] text-center relative z-10">
                                    {[...Array(10)].map((_, i) => (
                                        <div key={i} className="flex flex-col items-center">
                                            <span className="text-[10px] text-zinc-600 font-bold uppercase">Day {i+1}</span>
                                            {/* [핵심] 실제 날짜 표시 */}
                                            <span className="text-[9px] text-zinc-400 mt-0.5">{getFormatDate(proj.startDate, i)}</span>
                                        </div>
                                    ))}
                                </div>

                                {/* 전략 바 (P1 ~ P4 압축 버전) */}
                                <div className="space-y-3 relative z-10">
                                    {/* P1 */}
                                    <div className="flex items-center">
                                        <div className="w-[15%] text-[10px] text-zinc-400 font-bold flex items-center gap-2">
                                            <span className="bg-green-900/30 text-green-500 px-1.5 py-0.5 rounded">P1</span> 분석
                                        </div>
                                        <div className="w-[85%] bar-track h-6 relative">
                                            <div className="absolute left-0 w-[20%] h-full bg-green-500/10 rounded overflow-hidden">
                                                <div className="h-full bg-green-500 transition-all" style={{ width: `${proj.p1.percent}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                    {/* P2 */}
                                    <div className="flex items-center">
                                        <div className="w-[15%] text-[10px] text-zinc-400 font-bold flex items-center gap-2">
                                            <span className="bg-blue-900/30 text-blue-500 px-1.5 py-0.5 rounded">P2</span> 문서
                                        </div>
                                        <div className="w-[85%] bar-track h-6 relative">
                                            <div className="absolute left-[20%] w-[30%] h-full bg-blue-500/10 rounded overflow-hidden">
                                                <div className="h-full bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.3)] transition-all" style={{ width: `${proj.p2.percent}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                    {/* P3 */}
                                    <div className="flex items-center">
                                        <div className="w-[15%] text-[10px] text-zinc-400 font-bold flex items-center gap-2">
                                            <span className="bg-orange-900/30 text-orange-500 px-1.5 py-0.5 rounded">P3</span> 훈련
                                        </div>
                                        <div className="w-[85%] bar-track h-6 relative">
                                            <div className="absolute left-[50%] w-[30%] h-full bg-orange-500/10 rounded overflow-hidden">
                                                <div className="h-full bg-orange-500 transition-all" style={{ width: `${proj.p3.percent}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                    {/* P4 */}
                                    <div className="flex items-center">
                                        <div className="w-[15%] text-[10px] text-zinc-400 font-bold flex items-center gap-2">
                                            <span className="bg-red-900/30 text-red-500 px-1.5 py-0.5 rounded">P4</span> 제출
                                        </div>
                                        <div className="w-[85%] bar-track h-6 relative">
                                            <div className="absolute left-[80%] w-[20%] h-full bg-red-500/10 rounded overflow-hidden">
                                                <div className="h-full bg-red-500 transition-all" style={{ width: `${proj.p4.percent}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
