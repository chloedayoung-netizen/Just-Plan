<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Just Start - Strategy Garden v2</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .garden-grid { display: grid; grid-template-columns: 220px repeat(auto-fill, minmax(65px, 1fr)); width: 100%; }
        .cell { min-height: 80px; border: 0.1px solid #1f2937; display: flex; align-items: center; justify-content: center; position: relative; }
        .header-cell { background: #111827; font-weight: bold; font-size: 11px; height: 50px; position: sticky; top: 0; z-index: 30; }
        .category-cell { background: #000; justify-content: flex-start; padding: 15px; border-right: 1px solid #374151; position: sticky; left: 0; z-index: 20; }
        .tooltip { visibility: hidden; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); width: 220px; background: #fff; color: #000; padding: 12px; border-radius: 12px; font-size: 11px; z-index: 50; box-shadow: 0 10px 30px rgba(0,0,0,0.5); opacity: 0; transition: 0.2s; }
        .group:hover .tooltip { visibility: visible; opacity: 1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 1. 설정 (본인의 정보를 입력하세요)
        const SUPABASE_URL = "https://rcsicidesepmprytnyge.supabase.co";
        const SUPABASE_KEY = "sb_publishable_m5OZH8qVZdBD8N_EBYU3mw_L2AhObjN";
        const GEMINI_API_KEY = "AIzaSyDLjem3bGyx8h3-iak3QUT8e3a8md5sSIU";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [rawData, setRawData] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchData = async () => {
                    // [한글 컬럼명 반영] ID, 날짜, 대카테고리, 중카테고리, 내용
                    const { data, error } = await supabaseClient
                        .from('tasks') // ⚠️ 테이블명 확인!
                        .select('*');
                    
                    if (error) console.error("Data Load Error:", error);
                    else setRawData(data || []);
                    setLoading(false);
                };
                fetchData();
            }, []);

            // 2. 카테고리 위계 정리 (대분류 가나다순 정렬)
            const categories = useMemo(() => {
                const map = {};
                rawData.forEach(d => {
                    const big = d["대카테고리"] || "미분류";
                    const mid = d["중카테고리"] || "일반";
                    const key = `${big} > ${mid}`;
                    if (!map[key]) map[key] = { big, mid };
                });
                return Object.values(map).sort((a, b) => a.big.localeCompare(b.big));
            }, [rawData]);

            // 3. 날짜 헤더 (2/4 ~ 오늘)
            const dates = useMemo(() => {
                const start = new Date("2026-02-04");
                const end = new Date();
                const arr = [];
                for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                    arr.push(d.toISOString().split('T')[0]);
                }
                return arr;
            }, []);

            const getIcon = (count) => {
                if (count >= 5) return "🌳";
                if (count >= 3) return "🌿";
                if (count >= 1) return "🌱";
                return "";
            };

            if (loading) return <div className="h-screen flex items-center justify-center text-green-500 font-bold">정원을 불러오는 중...</div>;

            return (
                <div className="p-8">
                    <h1 className="text-3xl font-black mb-10 text-white tracking-tighter uppercase">Strategy Garden Timeline</h1>
                    
                    <div className="overflow-x-auto rounded-3xl border border-zinc-800 bg-black">
                        <div className="min-w-max">
                            {/* 헤더 */}
                            <div className="garden-grid border-b border-zinc-800">
                                <div className="cell header-cell">CATEGORY / DATE</div>
                                {dates.map(date => (
                                    <div key={date} className="cell header-cell flex flex-col items-center">
                                        <span className="text-zinc-500 text-[10px]">{date.split('-')[1]}/{date.split('-')[2]}</span>
                                        <span className="text-[9px] font-normal uppercase">{new Date(date).toLocaleDateString('ko-KR', {weekday: 'short'})}</span>
                                    </div>
                                ))}
                            </div>

                            {/* 바디 (카테고리별 행) */}
                            {categories.map(cat => (
                                <div key={`${cat.big}-${cat.mid}`} className="garden-grid border-b border-zinc-900 group/row">
                                    <div className="cell category-cell flex flex-col items-start gap-1">
                                        <span className="text-[9px] text-zinc-600 font-bold uppercase">{cat.big}</span>
                                        <span className="text-xs font-bold text-zinc-300 group-hover/row:text-green-400 transition-colors">{cat.mid}</span>
                                    </div>
                                    {dates.map(date => {
                                        // 해당 날짜/카테고리에 맞는 데이터 필터링
                                        const tasks = rawData.filter(d => 
                                            d["날짜"] === date && 
                                            d["대카테고리"] === cat.big && 
                                            d["중카테고리"] === cat.mid
                                        );
                                        return (
                                            <div key={date} className="cell group hover:bg-green-500/5 transition-colors">
                                                <span className="text-2xl">{getIcon(tasks.length)}</span>
                                                {/* Style B: 툴팁 (내용 표시) */}
                                                {tasks.length > 0 && (
                                                    <div className="tooltip">
                                                        <div className="font-black text-green-600 border-b mb-2 pb-1">{cat.mid}</div>
                                                        <ul className="space-y-1.5">
                                                            {tasks.map((t, i) => (
                                                                <li key={i} className="flex gap-2 leading-tight">
                                                                    <span className="text-green-500 mt-1">•</span>
                                                                    <span>{t["내용"]}</span>
                                                                </li>
                                                            ))}
                                                        </ul>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
