<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Start - Master AI Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #050505; font-family: 'Pretendard', sans-serif; color: white; }
        .glass-panel { background: #0f1115; border: 1px solid #1f2532; border-radius: 20px; transition: all 0.3s ease; }
        .bar-track { background: #18181b; border-radius: 6px; border: 1px solid #27272a; overflow: hidden;}
        .tab-active { background: #fff; color: #000; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .tab-inactive { background: #18181b; color: #71717a; border: 1px solid #27272a; }
        .progress-bar { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        ::-webkit-scrollbar { display: none; }
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        .view-btn-active { background: #27272a; color: white; border-color: #3f3f46; }
        .expand-anim { animation: slideDown 0.3s ease-out forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .fab-gradient { background: linear-gradient(135deg, #3b82f6 0%, #10b981 100%); }
        .modal-overlay { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="p-6 md:p-10 flex justify-center min-h-screen">
    <div id="root" class="w-full max-w-7xl"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SUPABASE_URL = "https://rcsicidesepmprytnyge.supabase.co";
        const SUPABASE_KEY = "sb_publishable_m5OZH8qVZdBD8N_EBYU3mw_L2AhObjN";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const getFormatDate = (dateStr) => {
            if (!dateStr) return "-";
            const date = new Date(dateStr);
            return isNaN(date) ? dateStr : `${String(date.getMonth() + 1).padStart(2,'0')}/${String(date.getDate()).padStart(2,'0')}`;
        };

        const calcActualMinutes = (start, end) => {
            if (!start || !end) return null;
            const [sH, sM] = start.split(':').map(Number);
            const [eH, eM] = end.split(':').map(Number);
            if (isNaN(sH) || isNaN(eH)) return null;
            let diff = (eH * 60 + eM) - (sH * 60 + sM);
            return diff >= 0 ? diff : diff + 1440; 
        };

        const safeDate = (value) => {
            const d = new Date(value);
            return isNaN(d) ? null : d;
        };

        const toDateOnly = (value) => {
            const d = safeDate(value);
            if (!d) return null;
            return new Date(d.getFullYear(), d.getMonth(), d.getDate());
        };

        const toHHMM = (date) => `${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
        const parseHHMMToMinutes = (value) => {
            if (!value || !value.includes(':')) return null;
            const [h, m] = value.split(':').map(Number);
            if (Number.isNaN(h) || Number.isNaN(m)) return null;
            return h * 60 + m;
        };
        const calcDurationFromHHMM = (start, end) => {
            const s = parseHHMMToMinutes(start);
            const e = parseHHMMToMinutes(end);
            if (s === null || e === null) return null;
            const diff = e >= s ? e - s : (e + 1440) - s;
            return diff;
        };

        const getCoachingMessage = (day) => {
            if (day <= 2) return "초반 48시간이 가장 중요합니다. 완벽주의 대신 착수 속도에 집중하세요.";
            if (day <= 5) return "중반 구간입니다. 딜레이가 생긴 작업은 가장 작은 단위로 다시 쪼개어 재가동하세요.";
            if (day <= 8) return "후반 가속 구간입니다. 미완료 항목을 우선순위 기준으로 정렬해 빠르게 정리하세요.";
            return "마무리 단계입니다. 새 작업 추가를 멈추고 제출/완료 가능한 항목에만 집중하세요.";
        };

        const App = () => {
            const [rawData, setRawData] = useState([]);
            const [activeTab, setActiveTab] = useState("");
            const [viewMode, setViewMode] = useState("board");
            const [loading, setLoading] = useState(true);
            
            // AI Modal States
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [aiGoal, setAiGoal] = useState("");
            const [apiKey, setApiKey] = useState(localStorage.getItem("gemini_api_key") || "");
            const [isGenerating, setIsGenerating] = useState(false);
            const MODEL_CANDIDATES = ['gemini-2.0-flash', 'gemini-2.0-flash-lite', 'gemini-1.5-flash'];
            const CUSTOM_OPTION = "__custom__";
            const [majorCategorySelect, setMajorCategorySelect] = useState("");
            const [majorCategoryCustom, setMajorCategoryCustom] = useState("");
            const [minorCategorySelect, setMinorCategorySelect] = useState("");
            const [minorCategoryCustom, setMinorCategoryCustom] = useState("");

            const [expandedTaskDetails, setExpandedTaskDetails] = useState({});
            const [splittingTaskId, setSplittingTaskId] = useState(null);
            const [playingTaskId, setPlayingTaskId] = useState(null);
            const [showDelayedOnly, setShowDelayedOnly] = useState(false);
            const [projectActions, setProjectActions] = useState({});
            const [projectForms, setProjectForms] = useState({});
            const [projectChartModes, setProjectChartModes] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem("project_chart_modes") || "{}");
                } catch {
                    return {};
                }
            });

            const toggleTaskDetail = (taskId) => setExpandedTaskDetails(prev => ({ ...prev, [taskId]: !prev[taskId] }));
            const getProjectKey = (projName) => `${activeTab}::${projName}`;
            const getTaskRunState = (task) => {
                const isDone = task["완료여부"] === 'O' || task["완료여부"] === 'o';
                const hasStart = !!task["시작시간"];
                const hasEnd = !!task["종료시간"];
                if (isDone || (hasStart && hasEnd)) return "done";
                if (hasStart && !hasEnd) return "running";
                return "idle";
            };
            const appendRunLog = (taskId, action, time) => {
                try {
                    const raw = localStorage.getItem("task_run_logs");
                    const parsed = raw ? JSON.parse(raw) : {};
                    const prev = parsed[taskId] || [];
                    parsed[taskId] = [...prev, { action, time, at: new Date().toISOString() }];
                    localStorage.setItem("task_run_logs", JSON.stringify(parsed));
                } catch (e) {
                    console.warn("run log save failed", e);
                }
            };
            const getTaskRunLogs = (taskId) => {
                if (!taskId) return [];
                try {
                    const raw = localStorage.getItem("task_run_logs");
                    const parsed = raw ? JSON.parse(raw) : {};
                    const list = parsed[taskId] || [];
                    return Array.isArray(list) ? list : [];
                } catch {
                    return [];
                }
            };
            const getTaskRunSessions = (taskId) => {
                const logs = getTaskRunLogs(taskId);
                const sessions = [];
                let pendingStart = null;
                logs.forEach((log) => {
                    if (log.action === "start") {
                        pendingStart = log;
                    }
                    if (log.action === "complete" && pendingStart) {
                        sessions.push({
                            start: pendingStart.time,
                            end: log.time,
                            durationMins: calcDurationFromHHMM(pendingStart.time, log.time),
                            startAt: pendingStart.at,
                            endAt: log.at
                        });
                        pendingStart = null;
                    }
                });
                return sessions;
            };
            const getRecommendedChartMode = (proj) => {
                const tasks = proj.allTasks || [];
                if (tasks.length === 0) return "date";
                const withMilestone = tasks.filter(t => ["P1", "P2", "P3", "P4"].includes(t["milestone"])).length;
                const milestoneRatio = withMilestone / tasks.length;
                if (milestoneRatio >= 0.6) return "milestone";
                return "date";
            };
            const getChartMode = (proj) => {
                const key = getProjectKey(proj.name);
                return projectChartModes[key] || getRecommendedChartMode(proj);
            };
            const setChartMode = (projName, mode) => {
                const key = getProjectKey(projName);
                setProjectChartModes(prev => ({ ...prev, [key]: mode }));
            };

            const fetchData = async () => {
                setLoading(true);
                const { data, error } = await supabaseClient
                    .from('tasks') 
                    .select('ID, 날짜, 마감일, 대카테고리, 중카테고리, 내용, 완료여부, milestone, 예상시간, 시작시간, 종료시간');
                if (error) console.error("Error:", error);
                else setRawData(data || []);
                setLoading(false);
            };

            useEffect(() => { fetchData(); }, []);

            const processedData = useMemo(() => {
                if (rawData.length === 0) return {};
                const groups = {};
                const today = new Date();
                today.setHours(0,0,0,0);

                rawData.forEach(row => {
                    const big = row["대카테고리"] || "미분류";
                    const mid = row["중카테고리"] || "기타";
                    if (!groups[big]) groups[big] = {};
                    if (!groups[big][mid]) groups[big][mid] = { name: mid, tasks: [], earliestDate: null };
                    groups[big][mid].tasks.push(row);
                    const rowDate = new Date(row["날짜"] || row["마감일"]);
                    if (!isNaN(rowDate) && (!groups[big][mid].earliestDate || rowDate < groups[big][mid].earliestDate)) {
                        groups[big][mid].earliestDate = rowDate;
                    }
                });

                const result = {};
                for (const big in groups) {
                    result[big] = Object.values(groups[big]).map(proj => {
                        const start = proj.earliestDate || new Date();
                        const diffTime = Math.abs(new Date() - start);
                        const currentDay = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) || 1;
                        
                        let totalDone = 0;
                        const today = new Date();
                        today.setHours(0,0,0,0);
                        const sortedTasks = proj.tasks.sort((a,b) => new Date(a["날짜"]||a["마감일"]) - new Date(b["날짜"]||b["마감일"])).map(task => {
                            const isDone = task["완료여부"] === 'O' || task["완료여부"] === 'o';
                            if (isDone) totalDone++;
                            let isDelayed = false;
                            let delayDays = 0;
                            if (!isDone && task["마감일"]) {
                                const due = new Date(task["마감일"]);
                                due.setHours(0,0,0,0);
                                if (due < today) {
                                    isDelayed = true;
                                    delayDays = Math.floor((today - due) / (1000 * 60 * 60 * 24));
                                }
                            }
                            return { ...task, isDone, isDelayed, delayDays };
                        });

                        const getPhaseData = (pTag) => {
                            const pTasks = sortedTasks.filter(t => t.milestone === pTag);
                            const total = pTasks.length;
                            const done = pTasks.filter(t => t.isDone).length;
                            return { total, done, percent: total === 0 ? 0 : Math.round((done/total)*100), tasks: pTasks };
                        };

                        return {
                            name: proj.name,
                            startDate: start.toISOString().split('T')[0],
                            currentDay,
                            totalTasks: proj.tasks.length,
                            totalDone,
                            totalPercent: proj.tasks.length === 0 ? 0 : Math.round((totalDone/proj.tasks.length)*100),
                            allTasks: sortedTasks,
                            phases: {
                                P1: { label: "전략 분석", color: "green", ...getPhaseData('P1') },
                                P2: { label: "문서 저격", color: "blue", ...getPhaseData('P2') },
                                P3: { label: "실전 훈련", color: "orange", ...getPhaseData('P3') },
                                P4: { label: "최종 제출", color: "red", ...getPhaseData('P4') }
                            }
                        };
                    });
                }
                return result;
            }, [rawData]);

            const majorCategoryOptions = useMemo(() => {
                return Array.from(new Set(rawData.map(row => (row["대카테고리"] || "").trim()).filter(Boolean)));
            }, [rawData]);

            const minorCategoryMap = useMemo(() => {
                const map = {};
                rawData.forEach(row => {
                    const big = (row["대카테고리"] || "").trim();
                    const mid = (row["중카테고리"] || "").trim();
                    if (!big || !mid) return;
                    if (!map[big]) map[big] = new Set();
                    map[big].add(mid);
                });
                const result = {};
                Object.keys(map).forEach(key => {
                    result[key] = Array.from(map[key]);
                });
                return result;
            }, [rawData]);

            useEffect(() => {
                const categories = Object.keys(processedData);
                if (categories.length > 0 && !activeTab) setActiveTab(categories[0]);
            }, [processedData, activeTab]);

            useEffect(() => {
                if (!majorCategorySelect && activeTab && majorCategoryOptions.includes(activeTab)) {
                    setMajorCategorySelect(activeTab);
                }
            }, [activeTab, majorCategoryOptions, majorCategorySelect]);

            useEffect(() => {
                localStorage.setItem("project_chart_modes", JSON.stringify(projectChartModes));
            }, [projectChartModes]);

            const resolveModelId = async (key) => {
                const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const listData = await listRes.json();
                if (listData.error) throw new Error(listData.error.message || "모델 목록 조회 실패");

                const models = listData.models || [];
                const available = new Set(
                    models
                        .filter(m => (m.supportedGenerationMethods || []).includes('generateContent'))
                        .map(m => (m.name || '').replace('models/', ''))
                );

                const selected = MODEL_CANDIDATES.find(m => available.has(m));
                if (!selected) {
                    throw new Error("generateContent를 지원하는 호환 모델을 찾지 못했습니다.");
                }
                return selected;
            };

            // AI Task Splitting Logic
            const handleAISplit = async () => {
                if (!aiGoal || !apiKey) return alert("목표와 API Key를 모두 입력해주세요.");
                const finalMajorCategory = (majorCategorySelect === CUSTOM_OPTION ? majorCategoryCustom : majorCategorySelect).trim();
                const finalMinorCategory = (minorCategorySelect === CUSTOM_OPTION ? minorCategoryCustom : minorCategorySelect).trim();
                if (!finalMajorCategory || !finalMinorCategory) return alert("대카테고리와 중카테고리를 설정해주세요.");
                
                // API Key 로컬 스토리지에 저장
                localStorage.setItem("gemini_api_key", apiKey);
                setIsGenerating(true);
                try {
                    const todayStr = new Date().toISOString().split('T')[0];
                    const prompt = `너는 생산성 전문가야. 사용자의 목표: "${aiGoal}"를 달성하기 위한 10일간의 상세 실행 계획을 세워줘.
                    결과는 반드시 순수한 JSON 배열 형식으로만 반환해.
                    JSON 구조: [{"날짜": "YYYY-MM-DD", "대카테고리": "분류", "중카테고리": "프로젝트명", "내용": "할일", "milestone": "P1~P4", "예상시간": "00분"}]
                    * milestone 기준: P1(전략분석), P2(문서저격), P3(실전훈련), P4(최종제출)
                    * 모든 항목의 대카테고리는 "${finalMajorCategory}"로 고정
                    * 모든 항목의 중카테고리는 "${finalMinorCategory}"로 고정
                    * 오늘(${todayStr})부터 10일치 데이터를 생성해.`;
                    const modelId = await resolveModelId(apiKey);

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const resData = await response.json();
                    
                    if (resData.error) {
                        throw new Error(resData.error.message || "API 호출 오류");
                    }

                    const text = resData.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!text) throw new Error("AI 응답 구조가 올바르지 않습니다.");

                    const jsonMatch = text.match(/\[[\s\S]*\]/);
                    if (!jsonMatch) throw new Error("JSON 형식을 찾을 수 없습니다.");
                    
                    const tasks = JSON.parse(jsonMatch[0]);
                    const normalizedTasks = tasks.map((task) => ({
                        ...task,
                        "ID": task["ID"] || crypto.randomUUID(),
                        "대카테고리": finalMajorCategory,
                        "중카테고리": finalMinorCategory
                    }));
                    const { error } = await supabaseClient.from('tasks').insert(normalizedTasks);
                    if (error) throw error;

                    alert("AI가 프로젝트를 성공적으로 설계했습니다!");
                    setIsModalOpen(false);
                    setAiGoal("");
                    setMinorCategorySelect("");
                    setMinorCategoryCustom("");
                    fetchData();
                } catch (e) {
                    console.error(e);
                    alert("AI 처리 중 오류가 발생했습니다: " + e.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            const handlePlayTask = async (task) => {
                if (!task["ID"]) return alert("ID가 없는 작업은 재생할 수 없습니다.");
                try {
                    setPlayingTaskId(task["ID"]);
                    const now = new Date();
                    const nowHHMM = toHHMM(now);
                    const runState = getTaskRunState(task);
                    const payload = runState === "running"
                        ? { "종료시간": nowHHMM, "완료여부": "O" }
                        : { "시작시간": nowHHMM, "종료시간": null, "완료여부": "" };
                    const { error } = await supabaseClient
                        .from('tasks')
                        .update(payload)
                        .eq('ID', task["ID"]);
                    if (error) throw error;
                    appendRunLog(task["ID"], runState === "running" ? "complete" : "start", nowHHMM);
                    await fetchData();
                } catch (e) {
                    console.error(e);
                    alert("재생 처리 중 오류가 발생했습니다: " + e.message);
                } finally {
                    setPlayingTaskId(null);
                }
            };

            const splitTextToRows = async ({ baseText, baseDate, baseDueDate, baseMilestone, baseMajor, baseMinor }) => {
                if (!apiKey) throw new Error("쪼개기에는 Gemini API Key가 필요합니다.");
                const modelId = await resolveModelId(apiKey);
                const prompt = `다음 작업을 더 작은 실행 단위로 3~5개로 쪼개줘.
원본 작업: "${baseText}"
반환은 반드시 JSON 배열만:
[{"내용":"...", "예상시간":"00분", "milestone":"P1~P4"}]
조건:
- 각 작업은 5~30분 단위의 아주 작은 행동
- milestone은 ${baseMilestone} 중심으로 맞춰서 생성`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const resData = await response.json();
                if (resData.error) throw new Error(resData.error.message || "API 호출 오류");

                const text = resData.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!text) throw new Error("AI 응답 구조가 올바르지 않습니다.");
                const jsonMatch = text.match(/\[[\s\S]*\]/);
                if (!jsonMatch) throw new Error("JSON 형식을 찾을 수 없습니다.");

                const splitTasks = JSON.parse(jsonMatch[0]);
                return splitTasks.map((item) => ({
                    "ID": crypto.randomUUID(),
                    "날짜": baseDate,
                    "마감일": baseDueDate || baseDate,
                    "대카테고리": baseMajor,
                    "중카테고리": baseMinor,
                    "내용": item["내용"] || "세부 작업",
                    "milestone": item["milestone"] || baseMilestone,
                    "예상시간": item["예상시간"] || "15분",
                    "완료여부": ""
                }));
            };

            const openProjectAction = (proj, action) => {
                const projectKey = getProjectKey(proj.name);
                const firstTask = proj.allTasks?.[0] || null;
                const todayStr = new Date().toISOString().split('T')[0];
                const baseForm = {
                    mode: 'single',
                    targetTaskId: firstTask?.["ID"] || "",
                    content: firstTask?.["내용"] || "",
                    date: firstTask?.["날짜"] || firstTask?.["마감일"] || todayStr,
                    dueDate: firstTask?.["마감일"] || firstTask?.["날짜"] || todayStr,
                    milestone: firstTask?.["milestone"] || "P1",
                    expected: firstTask?.["예상시간"] || "15분"
                };
                setProjectActions(prev => ({ ...prev, [projectKey]: action }));
                setProjectForms(prev => ({ ...prev, [projectKey]: baseForm }));
            };

            const closeProjectAction = (projName) => {
                const projectKey = getProjectKey(projName);
                setProjectActions(prev => ({ ...prev, [projectKey]: null }));
            };

            const updateProjectForm = (projName, patch) => {
                const projectKey = getProjectKey(projName);
                setProjectForms(prev => ({
                    ...prev,
                    [projectKey]: {
                        ...(prev[projectKey] || {}),
                        ...patch
                    }
                }));
            };

            const applySelectedTaskToForm = (proj, taskId) => {
                const selected = (proj.allTasks || []).find(t => t["ID"] === taskId);
                if (!selected) return;
                updateProjectForm(proj.name, {
                    targetTaskId: taskId,
                    content: selected["내용"] || "",
                    date: selected["날짜"] || selected["마감일"] || "",
                    dueDate: selected["마감일"] || selected["날짜"] || "",
                    milestone: selected["milestone"] || "P1",
                    expected: selected["예상시간"] || "15분"
                });
            };

            const submitProjectAction = async (proj) => {
                const projectKey = getProjectKey(proj.name);
                const action = projectActions[projectKey];
                const form = projectForms[projectKey] || {};
                const mode = form.mode || "single";
                const content = (form.content || "").trim();
                const date = form.date || new Date().toISOString().split('T')[0];
                const dueDate = form.dueDate || date;
                const milestone = form.milestone || "P1";
                const expected = form.expected || "15분";
                const targetTaskId = form.targetTaskId;

                try {
                    if (action === "add") {
                        if (!content) return alert("추가할 계획 내용을 입력해주세요.");
                        if (mode === "single") {
                            const row = {
                                "ID": crypto.randomUUID(),
                                "날짜": date,
                                "마감일": dueDate,
                                "대카테고리": activeTab || "미분류",
                                "중카테고리": proj.name,
                                "내용": content,
                                "milestone": milestone,
                                "예상시간": expected,
                                "완료여부": ""
                            };
                            const { error } = await supabaseClient.from('tasks').insert([row]);
                            if (error) throw error;
                        } else {
                            const rows = await splitTextToRows({
                                baseText: content,
                                baseDate: date,
                                baseDueDate: dueDate,
                                baseMilestone: milestone,
                                baseMajor: activeTab || "미분류",
                                baseMinor: proj.name
                            });
                            const { error } = await supabaseClient.from('tasks').insert(rows);
                            if (error) throw error;
                        }
                    }

                    if (action === "edit") {
                        if (!targetTaskId) return alert("수정할 계획을 선택해주세요.");
                        if (!content) return alert("수정할 계획 내용을 입력해주세요.");
                        if (mode === "single") {
                            const { error } = await supabaseClient
                                .from('tasks')
                                .update({
                                    "날짜": date,
                                    "마감일": dueDate,
                                    "대카테고리": activeTab || "미분류",
                                    "중카테고리": proj.name,
                                    "내용": content,
                                    "milestone": milestone,
                                    "예상시간": expected
                                })
                                .eq('ID', targetTaskId);
                            if (error) throw error;
                        } else {
                            const rows = await splitTextToRows({
                                baseText: content,
                                baseDate: date,
                                baseDueDate: dueDate,
                                baseMilestone: milestone,
                                baseMajor: activeTab || "미분류",
                                baseMinor: proj.name
                            });
                            const { error: delError } = await supabaseClient.from('tasks').delete().eq('ID', targetTaskId);
                            if (delError) throw delError;
                            const { error: insError } = await supabaseClient.from('tasks').insert(rows);
                            if (insError) throw insError;
                        }
                    }

                    if (action === "delete") {
                        if (!targetTaskId) return alert("삭제할 계획을 선택해주세요.");
                        if (!confirm("선택한 계획을 삭제할까요?")) return;
                        const { error } = await supabaseClient.from('tasks').delete().eq('ID', targetTaskId);
                        if (error) throw error;
                    }

                    await fetchData();
                    closeProjectAction(proj.name);
                } catch (e) {
                    console.error(e);
                    alert("프로젝트 작업 처리 중 오류가 발생했습니다: " + e.message);
                }
            };

            const handleSplitTask = async (task) => {
                if (!task["ID"]) return alert("ID가 없는 작업은 쪼개기할 수 없습니다.");
                if (!apiKey) return alert("쪼개기에는 Gemini API Key가 필요합니다.");

                const baseDate = task["날짜"] || task["마감일"] || new Date().toISOString().split('T')[0];
                const baseMajor = task["대카테고리"] || activeTab || "미분류";
                const baseMinor = task["중카테고리"] || "기타";
                const baseMilestone = task["milestone"] || "P1";
                const baseText = task["내용"] || "";

                try {
                    setSplittingTaskId(task["ID"]);
                    const rows = await splitTextToRows({
                        baseText,
                        baseDate,
                        baseDueDate: task["마감일"] || baseDate,
                        baseMilestone,
                        baseMajor,
                        baseMinor
                    });

                    const { error } = await supabaseClient.from('tasks').insert(rows);
                    if (error) throw error;
                    await fetchData();
                } catch (e) {
                    console.error(e);
                    alert("쪼개기 처리 중 오류가 발생했습니다: " + e.message);
                } finally {
                    setSplittingTaskId(null);
                }
            };

            const handleDeleteTask = async (task) => {
                if (!task["ID"]) return alert("ID가 없는 작업은 삭제할 수 없습니다.");
                if (!confirm("이 계획을 삭제할까요?")) return;
                try {
                    const { error } = await supabaseClient
                        .from('tasks')
                        .delete()
                        .eq('ID', task["ID"]);
                    if (error) throw error;
                    await fetchData();
                } catch (e) {
                    console.error(e);
                    alert("삭제 처리 중 오류가 발생했습니다: " + e.message);
                }
            };

            if (loading && rawData.length === 0) return <div className="mt-40 text-center text-zinc-500 animate-pulse">데이터 로드 중...</div>;

            const projects = processedData[activeTab] || [];
            const selectedMajorForMinor = majorCategorySelect && majorCategorySelect !== CUSTOM_OPTION ? majorCategorySelect : "";
            const minorCategoryOptions = selectedMajorForMinor
                ? (minorCategoryMap[selectedMajorForMinor] || [])
                : Array.from(new Set(rawData.map(row => (row["중카테고리"] || "").trim()).filter(Boolean)));
            const boardProjects = showDelayedOnly
                ? projects.filter(p => p.allTasks.some(t => t.isDelayed))
                : projects;

            return (
                <div className="w-full animate-fade-in relative pb-20">
                    {/* 상단 네비게이션 */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
                        <div className="flex gap-3 overflow-x-auto pb-2 w-full md:w-auto">
                            {Object.keys(processedData).map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} 
                                    className={`px-6 py-2.5 rounded-full font-bold text-xs transition-all flex-shrink-0 ${activeTab === tab ? 'tab-active' : 'tab-inactive hover:bg-zinc-800'}`}>
                                    {tab}
                                </button>
                            ))}
                        </div>
                        <div className="flex bg-zinc-900 p-1 rounded-xl border border-zinc-800">
                            <button onClick={() => setViewMode("board")} className={`px-4 py-2 rounded-lg text-[11px] font-bold transition-all ${viewMode === 'board' ? 'view-btn-active' : 'text-zinc-500'}`}>📋 보드</button>
                            <button onClick={() => setViewMode("strategy")} className={`px-4 py-2 rounded-lg text-[11px] font-bold transition-all ${viewMode === 'strategy' ? 'view-btn-active' : 'text-zinc-500'}`}>📊 전략</button>
                        </div>
                    </div>

                    {/* 메인 콘텐츠 */}
                    <main className="min-h-[500px]">
                        {viewMode === "board" ? (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 expand-anim">
                                <section>
                                    <div className="mb-4 flex items-center justify-between gap-3">
                                        <h2 className="text-sm font-bold text-zinc-500 uppercase tracking-widest flex items-center gap-2">
                                            <span className="w-2 h-2 rounded-full bg-yellow-500 pulse-dot"></span> In Progress
                                        </h2>
                                        <button
                                            onClick={() => setShowDelayedOnly(prev => !prev)}
                                            className={`text-[10px] font-black px-3 py-1.5 rounded-lg border transition-all ${showDelayedOnly ? 'bg-red-500/10 text-red-300 border-red-500/30' : 'bg-zinc-900 text-zinc-400 border-zinc-800 hover:text-zinc-200'}`}
                                        >
                                            {showDelayedOnly ? "지연만 보기 ON" : "지연만 보기"}
                                        </button>
                                    </div>
                                    {boardProjects.filter(p => p.totalPercent < 100).map(proj => (
                                        <div key={proj.name} className="glass-panel p-5 relative overflow-hidden mb-4">
                                            <div className="absolute left-0 top-0 bottom-0 w-1 bg-yellow-500"></div>
                                            <div className="flex justify-between items-start mb-3">
                                                <h3 className="text-md font-bold text-white">{proj.name}</h3>
                                                <div className="flex items-center gap-1">
                                                    {proj.allTasks.some(t => t.isDelayed) && (
                                                        <span className="text-[10px] font-black px-2 py-0.5 rounded bg-red-500/10 text-red-400 border border-red-500/20">지연</span>
                                                    )}
                                                    <span className="text-[10px] font-black px-2 py-0.5 rounded bg-yellow-500/10 text-yellow-400 border border-yellow-500/20">{proj.totalPercent}%</span>
                                                </div>
                                            </div>
                                            <div className="w-full bar-track h-1.5 mb-4">
                                                <div className="h-full bg-yellow-500 progress-bar" style={{ width: `${proj.totalPercent}%` }}></div>
                                            </div>
                                            <div className="space-y-1.5">
                                                {(showDelayedOnly ? proj.allTasks.filter(t => t.isDelayed) : proj.allTasks).slice(0, 3).map((task, i) => (
                                                    <div key={i} className="text-[10px] text-zinc-400 border-b border-zinc-800/50 pb-1 last:border-0">
                                                        <div className="flex items-center gap-2">
                                                            <span>{task.isDelayed ? '🚨' : task.isDone ? '✅' : '🏃'}</span>
                                                            <span className={`truncate flex-1 ${task.isDone ? 'line-through opacity-50' : ''}`}>{task["내용"]}</span>
                                                            <span className={`font-mono ${task.isDelayed ? 'text-red-400' : 'text-zinc-500'}`}>{getFormatDate(task["날짜"] || task["마감일"])}</span>
                                                        </div>
                                                        <div className="mt-1 flex items-center gap-1 pl-5">
                                                            {task.isDelayed && (
                                                                <span className="px-1.5 py-0.5 rounded bg-red-900/30 text-red-300">마감 {task.delayDays}일+</span>
                                                            )}
                                                            {(() => {
                                                                const actualMins = calcActualMinutes(task["시작시간"], task["종료시간"]);
                                                                const expectedMins = task["예상시간"] ? parseInt(String(task["예상시간"]).replace(/[^0-9]/g, "")) : null;
                                                                if (actualMins === null) return null;
                                                                const isOverTime = expectedMins && actualMins > expectedMins;
                                                                return (
                                                                    <span className={`px-1.5 py-0.5 rounded ${isOverTime ? 'bg-red-900/30 text-red-300' : 'bg-emerald-900/30 text-emerald-300'}`}>
                                                                        실제 {actualMins}분
                                                                    </span>
                                                                );
                                                            })()}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </section>
                                <section>
                                    <h2 className="text-sm font-bold text-zinc-500 mb-4 uppercase tracking-widest flex items-center gap-2">
                                        <span className="w-2 h-2 rounded-full bg-emerald-500"></span> Completed
                                    </h2>
                                    {boardProjects.filter(p => p.totalPercent === 100).map(proj => (
                                        <div key={proj.name} className="glass-panel p-5 relative overflow-hidden mb-4 opacity-60">
                                            <div className="absolute left-0 top-0 bottom-0 w-1 bg-emerald-500"></div>
                                            <h3 className="text-md font-bold text-white mb-2">{proj.name}</h3>
                                            <div className="w-full bar-track h-1.5 bg-emerald-500/20">
                                                <div className="h-full bg-emerald-500" style={{ width: '100%' }}></div>
                                            </div>
                                            <div className="mt-3 space-y-1.5">
                                                {proj.allTasks.slice(0, 2).map((task, i) => (
                                                    <div key={i} className="text-[10px] text-zinc-500 flex items-center gap-2">
                                                        <span>✅</span>
                                                        <span className="truncate flex-1 line-through">{task["내용"]}</span>
                                                        <span className="font-mono">{getFormatDate(task["날짜"] || task["마감일"])}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </section>
                            </div>
                        ) : (
                            <div className="space-y-5 expand-anim">
                                {projects.map((proj, idx) => {
                                    const tasks = proj.allTasks || [];
                                    const projectKey = getProjectKey(proj.name);
                                    const action = projectActions[projectKey];
                                    const form = projectForms[projectKey] || {};
                                    const chartMode = getChartMode(proj);
                                    const milestoneHeaders = ["P1", "P2", "P3", "P4"];
                                    const datedTasks = tasks
                                        .map((task, i) => ({ task, i, date: toDateOnly(task["날짜"] || task["마감일"]) }))
                                        .filter(item => item.date);
                                    const today = toDateOnly(new Date());
                                    const startDate = datedTasks.length > 0
                                        ? new Date(Math.min(...datedTasks.map(item => item.date.getTime())))
                                        : today;
                                    const endDate = datedTasks.length > 0
                                        ? new Date(Math.max(...datedTasks.map(item => item.date.getTime())))
                                        : startDate;
                                    const dayMs = 1000 * 60 * 60 * 24;
                                    const rangeDays = Math.max(1, Math.floor((endDate - startDate) / dayMs) + 1);
                                    const headers = Array.from({ length: rangeDays }, (_, dayIdx) => {
                                        const d = new Date(startDate);
                                        d.setDate(startDate.getDate() + dayIdx);
                                        return d;
                                    });
                                    const todayDate = toDateOnly(new Date());
                                    const todayOffset = Math.floor((todayDate - startDate) / dayMs);
                                    const todayInRange = todayOffset >= 0 && todayOffset < rangeDays;
                                    const todayLeft = `${((todayOffset + 0.5) / rangeDays) * 100}%`;
                                    const totalCols = chartMode === "date" ? rangeDays : 4;

                                    return (
                                        <div key={idx} className="glass-panel p-6">
                                            <div className="flex items-center justify-between mb-4">
                                                <h2 className="text-lg font-black text-white">{proj.name}</h2>
                                                <div className="flex items-center gap-2">
                                                    <div className="text-xs text-zinc-400 font-mono">
                                                        {getFormatDate(startDate)} - {getFormatDate(endDate)}
                                                    </div>
                                                    <div className="flex items-center gap-1 mr-1">
                                                        <button
                                                            onClick={() => setChartMode(proj.name, "date")}
                                                            className={`text-[10px] px-2 py-1 rounded border ${chartMode === "date" ? 'border-yellow-500/50 text-yellow-300 bg-yellow-500/10' : 'border-zinc-700 text-zinc-500'}`}
                                                        >
                                                            날짜
                                                        </button>
                                                        <button
                                                            onClick={() => setChartMode(proj.name, "milestone")}
                                                            className={`text-[10px] px-2 py-1 rounded border ${chartMode === "milestone" ? 'border-blue-500/50 text-blue-300 bg-blue-500/10' : 'border-zinc-700 text-zinc-500'}`}
                                                        >
                                                            마일스톤
                                                        </button>
                                                    </div>
                                                    <button
                                                        onClick={() => openProjectAction(proj, "add")}
                                                        className="text-[10px] px-2 py-1 rounded border border-emerald-600/40 text-emerald-300 bg-emerald-600/10"
                                                    >
                                                        추가
                                                    </button>
                                                    <button
                                                        onClick={() => openProjectAction(proj, "edit")}
                                                        className="text-[10px] px-2 py-1 rounded border border-blue-600/40 text-blue-300 bg-blue-600/10"
                                                    >
                                                        수정
                                                    </button>
                                                    <button
                                                        onClick={() => openProjectAction(proj, "delete")}
                                                        className="text-[10px] px-2 py-1 rounded border border-rose-600/40 text-rose-300 bg-rose-600/10"
                                                    >
                                                        삭제
                                                    </button>
                                                </div>
                                            </div>

                                            {action && (
                                                <div className="mb-4 p-3 rounded-xl border border-zinc-800 bg-black/30 space-y-3">
                                                    <div className="flex items-center justify-between">
                                                        <p className="text-[11px] font-bold text-zinc-300">
                                                            {action === "add" ? "계획 추가" : action === "edit" ? "계획 수정" : "계획 삭제"}
                                                        </p>
                                                        <button
                                                            onClick={() => closeProjectAction(proj.name)}
                                                            className="text-[10px] px-2 py-1 rounded border border-zinc-700 text-zinc-400"
                                                        >
                                                            닫기
                                                        </button>
                                                    </div>

                                                    {(action === "edit" || action === "delete") && (
                                                        <div>
                                                            <label className="block text-[10px] text-zinc-500 mb-1">대상 계획</label>
                                                            <select
                                                                value={form.targetTaskId || ""}
                                                                onChange={(e) => applySelectedTaskToForm(proj, e.target.value)}
                                                                className="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs"
                                                            >
                                                                <option value="">선택하세요</option>
                                                                {tasks.map((task) => (
                                                                    <option key={task["ID"]} value={task["ID"]}>
                                                                        {getFormatDate(task["날짜"] || task["마감일"])} | {task["내용"]}
                                                                    </option>
                                                                ))}
                                                            </select>
                                                        </div>
                                                    )}

                                                    {action !== "delete" && (
                                                        <>
                                                            <div className="flex items-center gap-2">
                                                                <button
                                                                    onClick={() => updateProjectForm(proj.name, { mode: "single" })}
                                                                    className={`text-[10px] px-2 py-1 rounded border ${form.mode !== "split" ? 'border-emerald-500 text-emerald-300 bg-emerald-500/10' : 'border-zinc-700 text-zinc-500'}`}
                                                                >
                                                                    단일
                                                                </button>
                                                                <button
                                                                    onClick={() => updateProjectForm(proj.name, { mode: "split" })}
                                                                    className={`text-[10px] px-2 py-1 rounded border ${form.mode === "split" ? 'border-blue-500 text-blue-300 bg-blue-500/10' : 'border-zinc-700 text-zinc-500'}`}
                                                                >
                                                                    쪼개기
                                                                </button>
                                                            </div>
                                                            <input
                                                                value={form.content || ""}
                                                                onChange={(e) => updateProjectForm(proj.name, { content: e.target.value })}
                                                                className="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs"
                                                                placeholder="계획 내용을 입력하세요"
                                                            />
                                                            <div className="grid grid-cols-2 gap-2">
                                                                <input
                                                                    type="date"
                                                                    value={form.date || ""}
                                                                    onChange={(e) => updateProjectForm(proj.name, { date: e.target.value })}
                                                                    className="bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs"
                                                                />
                                                                <input
                                                                    type="date"
                                                                    value={form.dueDate || ""}
                                                                    onChange={(e) => updateProjectForm(proj.name, { dueDate: e.target.value })}
                                                                    className="bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs"
                                                                />
                                                            </div>
                                                            <div className="grid grid-cols-2 gap-2">
                                                                <select
                                                                    value={form.milestone || "P1"}
                                                                    onChange={(e) => updateProjectForm(proj.name, { milestone: e.target.value })}
                                                                    className="bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs"
                                                                >
                                                                    <option value="P1">P1</option>
                                                                    <option value="P2">P2</option>
                                                                    <option value="P3">P3</option>
                                                                    <option value="P4">P4</option>
                                                                </select>
                                                                <input
                                                                    value={form.expected || ""}
                                                                    onChange={(e) => updateProjectForm(proj.name, { expected: e.target.value })}
                                                                    className="bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs"
                                                                    placeholder="예상시간 (예: 20분)"
                                                                />
                                                            </div>
                                                        </>
                                                    )}

                                                    <div className="flex justify-end">
                                                        <button
                                                            onClick={() => submitProjectAction(proj)}
                                                            className={`text-[11px] font-bold px-3 py-1.5 rounded-lg border ${action === 'delete' ? 'border-rose-500/40 text-rose-300 bg-rose-500/10' : 'border-emerald-500/40 text-emerald-300 bg-emerald-500/10'}`}
                                                        >
                                                            {action === "add" ? "추가 실행" : action === "edit" ? "수정 실행" : "삭제 실행"}
                                                        </button>
                                                    </div>
                                                </div>
                                            )}

                                            <div className="overflow-x-auto">
                                                <div className="min-w-[760px] relative">
                                                    {chartMode === "date" && todayInRange && (
                                                        <div
                                                            className="absolute top-0 bottom-0 border-l border-dashed border-yellow-400/90 z-20 pointer-events-none"
                                                            style={{ left: `calc(220px + ${todayLeft})` }}
                                                        >
                                                            <div className="absolute -top-3 -translate-x-1/2 text-[9px] font-black bg-yellow-400 text-black px-1.5 py-0.5 rounded-full">
                                                                TODAY
                                                            </div>
                                                        </div>
                                                    )}

                                                    <div className="grid mb-1 text-[9px] text-zinc-600" style={{ gridTemplateColumns: `220px repeat(${totalCols}, minmax(0,1fr))` }}>
                                                        <div className="font-bold uppercase tracking-widest">{chartMode === "date" ? "Day" : "Phase"}</div>
                                                        {chartMode === "date" ? headers.map((_, i) => (
                                                            <div key={i} className="text-center font-mono">D{i + 1}</div>
                                                        )) : milestoneHeaders.map((m) => (
                                                            <div key={m} className="text-center font-mono">{m}</div>
                                                        ))}
                                                    </div>
                                                    <div className="grid mb-2 text-[10px] text-zinc-500" style={{ gridTemplateColumns: `220px repeat(${totalCols}, minmax(0,1fr))` }}>
                                                        <div className="font-bold uppercase tracking-widest">Plan</div>
                                                        {chartMode === "date" ? headers.map((date, i) => (
                                                            <div key={i} className="text-center font-mono">{getFormatDate(date)}</div>
                                                        )) : (
                                                            <>
                                                                <div className="text-center">전략분석</div>
                                                                <div className="text-center">문서저격</div>
                                                                <div className="text-center">실전훈련</div>
                                                                <div className="text-center">최종제출</div>
                                                            </>
                                                        )}
                                                    </div>

                                                    <div className="space-y-2">
                                                        {tasks.map((task, i) => {
                                                            const taskId = task["ID"] || `${proj.name}-${i}`;
                                                            const taskDate = toDateOnly(task["날짜"] || task["마감일"]) || startDate;
                                                            const milestoneIndex = Math.max(milestoneHeaders.indexOf(task["milestone"]), 0);
                                                            const offset = chartMode === "date"
                                                                ? Math.min(Math.max(Math.floor((taskDate - startDate) / dayMs), 0), rangeDays - 1)
                                                                : milestoneIndex;
                                                            const left = `${(offset / totalCols) * 100}%`;
                                                            const width = `${Math.max(100 / totalCols, 6)}%`;
                                                            return (
                                                                <div key={taskId} className="bg-zinc-950/50 border border-zinc-800 rounded-xl p-3">
                                                                    <div className="flex items-center gap-2 mb-2">
                                                                        <button
                                                                            onClick={() => toggleTaskDetail(taskId)}
                                                                            className="text-zinc-400 hover:text-white text-xs px-2 py-1 rounded bg-zinc-900 border border-zinc-800"
                                                                        >
                                                                            {expandedTaskDetails[taskId] ? "접기" : "펼치기"}
                                                                        </button>
                                                                        <div className={`text-xs flex-1 ${task.isDone ? 'line-through text-zinc-500' : task.isDelayed ? 'text-red-200' : 'text-zinc-200'}`}>
                                                                            {task.isDelayed ? '🚨 ' : task.isDone ? '✅ ' : '🏃 '}
                                                                            {task["내용"] || "내용 없음"}
                                                                        </div>
                                                                        <div className="flex items-center gap-1">
                                                                            <button
                                                                                onClick={() => handlePlayTask(task)}
                                                                                disabled={playingTaskId === task["ID"]}
                                                                                className="px-2 py-1 rounded bg-emerald-600/20 text-emerald-300 border border-emerald-600/30 text-[11px] font-bold disabled:opacity-50"
                                                                            >
                                                                                {getTaskRunState(task) === "running" ? "완료" : getTaskRunState(task) === "done" ? "다시시작" : "재생"}
                                                                            </button>
                                                                            <button
                                                                                onClick={() => handleSplitTask(task)}
                                                                                disabled={splittingTaskId === task["ID"]}
                                                                                className="px-2 py-1 rounded bg-blue-600/20 text-blue-300 border border-blue-600/30 text-[11px] font-bold disabled:opacity-50"
                                                                            >
                                                                                쪼개기
                                                                            </button>
                                                                            <button
                                                                                onClick={() => handleDeleteTask(task)}
                                                                                className="px-2 py-1 rounded bg-rose-600/20 text-rose-300 border border-rose-600/30 text-[11px] font-bold"
                                                                            >
                                                                                지우기
                                                                            </button>
                                                                        </div>
                                                                    </div>

                                                                    <div className="relative h-7 bg-zinc-900 border border-zinc-800 rounded-lg overflow-hidden">
                                                                        <div className="absolute inset-0 flex">
                                                                            {Array.from({ length: totalCols }).map((_, hIdx) => (
                                                                                <div key={hIdx} className="flex-1 border-r border-zinc-800/60"></div>
                                                                            ))}
                                                                        </div>
                                                                        <div
                                                                            className={`absolute top-1 bottom-1 rounded-md ${task.isDone ? 'bg-emerald-500/70' : 'bg-blue-500/80'}`}
                                                                            style={{ left, width }}
                                                                        ></div>
                                                                    </div>

                                                                    {expandedTaskDetails[taskId] && (
                                                                        <div className="mt-3 p-3 bg-black/40 border border-zinc-800 rounded-lg text-xs text-zinc-300 grid grid-cols-2 gap-2">
                                                                            <div>날짜: <span className="font-mono text-zinc-400">{getFormatDate(task["날짜"] || task["마감일"])}</span></div>
                                                                            <div>마일스톤: <span className="font-mono text-zinc-400">{task["milestone"] || "-"}</span></div>
                                                                            <div>예상시간: <span className="font-mono text-zinc-400">{task["예상시간"] || "-"}</span></div>
                                                                            <div>진행상태: <span className="font-mono text-zinc-400">{getTaskRunState(task) === "running" ? "실행중" : getTaskRunState(task) === "done" ? "완료" : "대기"}</span></div>
                                                                            <div>지연상태: <span className={`font-mono ${task.isDelayed ? 'text-red-400' : 'text-zinc-400'}`}>{task.isDelayed ? `마감 ${task.delayDays}일 지남` : "정상"}</span></div>
                                                                            <div>
                                                                                {(() => {
                                                                                    const actualMins = calcActualMinutes(task["시작시간"], task["종료시간"]);
                                                                                    const expectedMins = task["예상시간"] ? parseInt(String(task["예상시간"]).replace(/[^0-9]/g, "")) : null;
                                                                                    if (actualMins === null) return <span className="font-mono text-zinc-500">실제시간 미기록</span>;
                                                                                    const isOverTime = expectedMins && actualMins > expectedMins;
                                                                                    return (
                                                                                        <span className={`font-mono ${isOverTime ? 'text-red-400' : 'text-emerald-400'}`}>
                                                                                            실제 {actualMins}분
                                                                                        </span>
                                                                                    );
                                                                                })()}
                                                                            </div>
                                                                            <div className="col-span-2">상세내용: <span className="text-zinc-200">{task["내용"] || "-"}</span></div>
                                                                            <div className="col-span-2 mt-1">
                                                                                <div className="text-[10px] text-zinc-500 mb-1">실행 로그</div>
                                                                                {(() => {
                                                                                    const logs = getTaskRunLogs(task["ID"]);
                                                                                    const sessions = getTaskRunSessions(task["ID"]);
                                                                                    if (logs.length === 0) return <div className="text-[10px] text-zinc-600">기록 없음</div>;
                                                                                    return (
                                                                                        <div className="space-y-1">
                                                                                            {logs.slice().reverse().map((log, idx) => (
                                                                                                <div key={idx} className="flex items-center justify-between text-[10px] border-b border-zinc-800/60 pb-1 last:border-0">
                                                                                                    <span className={`${log.action === 'complete' ? 'text-emerald-300' : 'text-blue-300'}`}>
                                                                                                        {log.action === 'complete' ? '완료' : '시작'}
                                                                                                    </span>
                                                                                                    <span className="font-mono text-zinc-400">{log.time || "-"}</span>
                                                                                                    <span className="font-mono text-zinc-500">{log.at ? getFormatDate(log.at) : "-"}</span>
                                                                                                </div>
                                                                                            ))}
                                                                                            {sessions.length > 0 && (
                                                                                                <div className="mt-2 pt-2 border-t border-zinc-800/60 space-y-1">
                                                                                                    {sessions.slice().reverse().map((s, sIdx) => (
                                                                                                        <div key={sIdx} className="text-[10px] flex items-center justify-between">
                                                                                                            <span className="text-zinc-500">세션 {sessions.length - sIdx}</span>
                                                                                                            <span className="font-mono text-zinc-400">{s.start} - {s.end}</span>
                                                                                                            <span className={`${s.durationMins !== null && s.durationMins > 0 ? 'text-emerald-300' : 'text-zinc-500'} font-mono`}>
                                                                                                                {s.durationMins !== null ? `${s.durationMins}분` : "-"}
                                                                                                            </span>
                                                                                                        </div>
                                                                                                    ))}
                                                                                                </div>
                                                                                            )}
                                                                                        </div>
                                                                                    );
                                                                                })()}
                                                                            </div>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="mt-5 bg-[#050608] border border-emerald-900/50 rounded-xl p-4 flex items-center gap-3">
                                                <span className="text-lg bg-zinc-900 px-2 py-1 rounded-lg border border-zinc-800">🚀</span>
                                                <div>
                                                    <p className="text-emerald-400 text-[10px] font-bold tracking-widest uppercase">코칭</p>
                                                    <p className="text-xs text-zinc-300">{getCoachingMessage(proj.currentDay)}</p>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    {/* Floating Action Button */}
                    <button 
                        onClick={() => setIsModalOpen(true)}
                        className="fixed bottom-10 right-10 fab-gradient px-8 py-4 rounded-full font-black text-white shadow-2xl hover:scale-105 transition-transform flex items-center gap-3 z-40"
                    >
                        <span className="text-xl">✨</span> AI로 새 프로젝트 시작
                    </button>

                    {/* AI Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 modal-overlay">
                            <div className="glass-panel w-full max-w-lg p-8 shadow-[0_0_50px_rgba(0,0,0,0.5)] relative">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-6 right-6 text-zinc-500 hover:text-white text-xl">✕</button>
                                
                                <div className="mb-8">
                                    <h2 className="text-2xl font-black text-white mb-2">AI Project Architect</h2>
                                    <p className="text-zinc-500 text-sm">목표를 입력하면 AI가 10일간의 실행 전략을 설계합니다.</p>
                                </div>

                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">Gemini API Key</label>
                                        <input 
                                            type="password" 
                                            value={apiKey}
                                            onChange={(e) => setApiKey(e.target.value)}
                                            className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                                            placeholder="Google AI Studio에서 발급받은 키를 입력하세요"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">Your Goal</label>
                                        <textarea 
                                            value={aiGoal}
                                            onChange={(e) => setAiGoal(e.target.value)}
                                            className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-sm h-32 focus:ring-2 focus:ring-emerald-500 outline-none transition-all resize-none"
                                            placeholder="예: 2주 안에 리액트 포트폴리오 완성하기, 토익 800점 달성하기 등"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">대카테고리</label>
                                        <select
                                            value={majorCategorySelect}
                                            onChange={(e) => {
                                                setMajorCategorySelect(e.target.value);
                                                setMinorCategorySelect("");
                                                setMinorCategoryCustom("");
                                            }}
                                            className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                                        >
                                            <option value="">선택하세요</option>
                                            {majorCategoryOptions.map((cat) => (
                                                <option key={cat} value={cat}>{cat}</option>
                                            ))}
                                            <option value={CUSTOM_OPTION}>직접 입력</option>
                                        </select>
                                        {majorCategorySelect === CUSTOM_OPTION && (
                                            <input
                                                type="text"
                                                value={majorCategoryCustom}
                                                onChange={(e) => setMajorCategoryCustom(e.target.value)}
                                                className="mt-2 w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                                                placeholder="대카테고리를 직접 입력하세요"
                                            />
                                        )}
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">중카테고리</label>
                                        <select
                                            value={minorCategorySelect}
                                            onChange={(e) => setMinorCategorySelect(e.target.value)}
                                            className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                                        >
                                            <option value="">선택하세요</option>
                                            {minorCategoryOptions.map((cat) => (
                                                <option key={cat} value={cat}>{cat}</option>
                                            ))}
                                            <option value={CUSTOM_OPTION}>직접 입력</option>
                                        </select>
                                        {minorCategorySelect === CUSTOM_OPTION && (
                                            <input
                                                type="text"
                                                value={minorCategoryCustom}
                                                onChange={(e) => setMinorCategoryCustom(e.target.value)}
                                                className="mt-2 w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                                                placeholder="중카테고리를 직접 입력하세요"
                                            />
                                        )}
                                    </div>
                                    
                                    <button 
                                        onClick={handleAISplit}
                                        disabled={isGenerating}
                                        className={`w-full py-5 rounded-2xl font-black text-sm transition-all ${isGenerating ? 'bg-zinc-800 text-zinc-500' : 'fab-gradient text-white hover:opacity-90'}`}
                                    >
                                        {isGenerating ? (
                                            <span className="flex items-center justify-center gap-3">
                                                <span className="w-4 h-4 border-2 border-zinc-500 border-t-white rounded-full animate-spin"></span>
                                                AI가 전략을 짜는 중...
                                            </span>
                                        ) : "전략 설계 시작하기"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
