<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Start - Master Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #050505; font-family: 'Pretendard', sans-serif; color: white; }
        .glass-panel { background: #0f1115; border: 1px solid #1f2532; border-radius: 20px; transition: all 0.3s ease; }
        .glass-panel:hover { border-color: #2a313e; }
        .bar-track { background: #18181b; border-radius: 8px; border: 1px solid #27272a; overflow: hidden;}
        .tab-active { background: #fff; color: #000; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .tab-inactive { background: #18181b; color: #71717a; border: 1px solid #27272a; }
        .progress-bar { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        ::-webkit-scrollbar { display: none; }
        .expand-anim { animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-6 md:p-12 flex justify-center min-h-screen">
    <div id="root" class="w-full max-w-6xl"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ⚠️ 사용자님의 Supabase URL과 KEY로 꼭 변경하세요!
        const SUPABASE_URL = "https://rcsicidesepmprytnyge.supabase.co";
        const SUPABASE_KEY = "sb_publishable_m5OZH8qVZdBD8N_EBYU3mw_L2AhObjN";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 유틸리티 함수 ---
        const getFormatDate = (dateStr) => {
            if (!dateStr) return "-";
            const date = new Date(dateStr);
            if (isNaN(date)) return dateStr;
            return `${String(date.getMonth() + 1).padStart(2,'0')}/${String(date.getDate()).padStart(2,'0')}`;
        };

        const calcActualMinutes = (start, end) => {
            if (!start || !end) return null;
            const [sH, sM] = start.split(':').map(Number);
            const [eH, eM] = end.split(':').map(Number);
            if (isNaN(sH) || isNaN(eH)) return null;
            let diff = (eH * 60 + eM) - (sH * 60 + sM);
            return diff >= 0 ? diff : diff + 1440; 
        };

        const getCoachingMessage = (day) => {
            if (day <= 2) return "현재 전략 분석 단계입니다. 정확한 타겟팅과 구조화에 집중하세요!";
            if (day <= 5) return "현재 문서 저격(P2) 단계입니다. 오탈자보다는 내 경험이 줄 '임팩트'에 집중하세요!";
            if (day <= 8) return "실전 훈련(P3) 단계입니다. 완벽함보다는 빠른 피드백 루프를 도는 것이 핵심입니다.";
            return "최종 제출을 앞두고 있습니다. 마지막 점검 후 과감하게 실행하세요!";
        };

        const App = () => {
            const [rawData, setRawData] = useState([]);
            const [activeTab, setActiveTab] = useState("");
            const [loading, setLoading] = useState(true);
            
            // 전략 맵(구직/학습) 뷰를 위한 아코디언 상태
            const [expandedProjects, setExpandedProjects] = useState({}); 
            const [expandedPhases, setExpandedPhases] = useState({});     

            const toggleProject = (projName) => setExpandedProjects(prev => ({ ...prev, [projName]: !prev[projName] }));
            const togglePhase = (projName, pTag) => setExpandedPhases(prev => ({ ...prev, [`${projName}-${pTag}`]: !prev[`${projName}-${pTag}`] }));

            // 1. 슈파베이스 데이터 호출 (마감일 포함)
            useEffect(() => {
                const fetchData = async () => {
                    const { data, error } = await supabaseClient
                        .from('tasks') 
                        .select('날짜, 마감일, 대카테고리, 중카테고리, 내용, 완료여부, milestone, 예상시간, 시작시간, 종료시간');
                    
                    if (error) console.error("Error fetching data:", error);
                    else setRawData(data || []);
                    setLoading(false);
                };
                fetchData();
            }, []);

            // 2. 데이터 컨버터
            const processedData = useMemo(() => {
                if (rawData.length === 0) return {};
                const groups = {};

                rawData.forEach(row => {
                    const big = row["대카테고리"] || "미분류";
                    const mid = row["중카테고리"] || "기타";
                    
                    if (!groups[big]) groups[big] = {};
                    if (!groups[big][mid]) groups[big][mid] = { name: mid, tasks: [], earliestDate: null };
                    groups[big][mid].tasks.push(row);

                    const rowDate = new Date(row["날짜"] || row["마감일"]);
                    if (!isNaN(rowDate)) {
                        if (!groups[big][mid].earliestDate || rowDate < groups[big][mid].earliestDate) {
                            groups[big][mid].earliestDate = rowDate;
                        }
                    }
                });

                const result = {};
                const today = new Date();
                today.setHours(0,0,0,0);

                for (const big in groups) {
                    result[big] = Object.values(groups[big]).map(proj => {
                        const start = proj.earliestDate || new Date();
                        const diffTime = Math.abs(new Date() - start);
                        const currentDay = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) || 1;

                        // 전체 태스크 정렬 및 딜레이 계산 (일상 탭 용도)
                        let totalDone = 0;
                        const sortedTasks = proj.tasks.sort((a,b) => new Date(a["날짜"]||a["마감일"]) - new Date(b["날짜"]||b["마감일"])).map(task => {
                            const isDone = task["완료여부"] === 'O' || task["완료여부"] === 'o';
                            if (isDone) totalDone++;
                            
                            let isDelayed = false;
                            let delayDays = 0;
                            if (!isDone && task["마감일"]) {
                                const due = new Date(task["마감일"]);
                                due.setHours(0,0,0,0);
                                if (due < today) {
                                    isDelayed = true;
                                    delayDays = Math.floor((today - due) / (1000*60*60*24));
                                }
                            }
                            return { ...task, isDone, isDelayed, delayDays };
                        });

                        const totalTasks = proj.tasks.length;
                        const totalPercent = totalTasks === 0 ? 0 : Math.round((totalDone/totalTasks)*100);

                        // P1~P4 계산 (전략 탭 용도)
                        const getPhaseData = (pTag) => {
                            const pTasks = sortedTasks.filter(t => t.milestone === pTag);
                            const total = pTasks.length;
                            const done = pTasks.filter(t => t.isDone).length;
                            return { total, done, percent: total === 0 ? 0 : Math.round((done/total)*100), tasks: pTasks };
                        };

                        return {
                            name: proj.name, 
                            startDate: start.toISOString().split('T')[0], 
                            currentDay,
                            totalTasks,
                            totalDone,
                            totalPercent,
                            allTasks: sortedTasks,
                            phases: {
                                P1: { label: "전략 분석", color: "green", ...getPhaseData('P1') },
                                P2: { label: "문서 저격", color: "blue", ...getPhaseData('P2') },
                                P3: { label: "실전 훈련", color: "orange", ...getPhaseData('P3') },
                                P4: { label: "최종 제출", color: "red", ...getPhaseData('P4') }
                            }
                        };
                    });
                }
                return result;
            }, [rawData]);

            useEffect(() => {
                const categories = Object.keys(processedData);
                if (categories.length > 0 && !activeTab) setActiveTab(categories[0]);
            }, [processedData, activeTab]);

            if (loading) return <div className="mt-40 text-center text-zinc-500 animate-pulse">본부와 통신 중...</div>;
            if (Object.keys(processedData).length === 0) return <div className="mt-40 text-center text-zinc-500">데이터가 없습니다.</div>;

            // 🌟 엔진 구분: 탭 이름에 '일상/행정/루틴/생활'이 포함되면 Life View 렌더링
            const isLifeView = ['일상', '행정', '루틴', '생활'].some(keyword => activeTab.includes(keyword));
            const projects = processedData[activeTab] || [];

            // ==========================================
            // [VIEW 1] 구직/학습: 10일 전략 맵 (드롭다운 포함)
            // ==========================================
            const renderStrategyView = () => (
                <div className="space-y-4 animate-fade-in">
                    {projects.map((proj, idx) => {
                        const isProjExpanded = expandedProjects[proj.name];
                        const safeCurrentDay = Math.min(proj.currentDay, 10); 

                        return (
                            <div key={idx} className="glass-panel overflow-hidden">
                                <div className="p-6 flex justify-between items-center cursor-pointer hover:bg-white/5 transition-colors" onClick={() => toggleProject(proj.name)}>
                                    <h2 className="text-xl font-black text-white flex items-center gap-3">
                                        <span className="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.8)]"></span>
                                        {proj.name}
                                    </h2>
                                    <div className="flex items-center gap-6">
                                        <div className="text-right">
                                            <p className="text-zinc-500 text-[9px] font-bold uppercase tracking-wider mb-1">Current Status</p>
                                            <span className="text-yellow-400 text-lg font-black font-mono">Day {proj.currentDay} / 10</span>
                                        </div>
                                        <div className="text-zinc-500 text-sm bg-zinc-900 px-3 py-1.5 rounded-lg border border-zinc-800">
                                            {isProjExpanded ? '▲ 닫기' : '▼ 상세보기'}
                                        </div>
                                    </div>
                                </div>

                                {isProjExpanded && (
                                    <div className="p-8 border-t border-zinc-800/50 bg-[#0f1115] expand-anim">
                                        <div className="relative pb-8">
                                            {/* TODAY 수직 점선 */}
                                            <div className="absolute top-0 bottom-0 border-l border-dashed border-yellow-400/80 z-20 transition-all duration-1000" style={{ left: `calc(20% + ${(safeCurrentDay / 10) * 80}%)` }}>
                                                <div className="bg-yellow-400 text-black text-[10px] font-black px-2 py-0.5 rounded-full absolute -top-4 -translate-x-1/2 shadow-[0_0_10px_rgba(250,204,21,0.5)]">TODAY</div>
                                            </div>

                                            {/* 날짜 눈금자 */}
                                            <div className="grid grid-cols-10 mb-8 ml-[20%] text-center relative z-10 opacity-70">
                                                {[...Array(10)].map((_, i) => (
                                                    <div key={i} className="flex flex-col items-center">
                                                        <span className="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Day {i+1}</span>
                                                        <span className="text-[9px] text-zinc-600 mt-1">{getFormatDate(new Date(new Date(proj.startDate).setDate(new Date(proj.startDate).getDate() + i)))}</span>
                                                    </div>
                                                ))}
                                            </div>

                                            {/* P1 ~ P4 막대그래프 */}
                                            <div className="space-y-6 relative z-10">
                                                {Object.entries(proj.phases).map(([pTag, pData]) => {
                                                    const isPhaseExpanded = expandedPhases[`${proj.name}-${pTag}`];
                                                    const hasTasks = pData.total > 0;
                                                    const layout = { 'P1': { left: '0%', width: '20%' }, 'P2': { left: '20%', width: '30%' }, 'P3': { left: '50%', width: '30%' }, 'P4': { left: '80%', width: '20%' } }[pTag];

                                                    return (
                                                        <div key={pTag} className="flex flex-col">
                                                            <div className={`flex items-start group ${hasTasks ? 'cursor-pointer' : 'opacity-40 cursor-not-allowed'}`} onClick={() => hasTasks && togglePhase(proj.name, pTag)}>
                                                                <div className="w-[20%] pr-4 pt-1">
                                                                    <div className="flex items-center gap-2 mb-1">
                                                                        <span className={`bg-${pData.color}-900/40 text-${pData.color}-400 text-[10px] px-1.5 py-0.5 rounded font-bold`}>{pTag}</span>
                                                                        <span className="font-bold text-sm text-zinc-100">{pData.label}</span>
                                                                    </div>
                                                                    <p className="text-[10px] text-zinc-500 mt-1">{pData.total}개 행동 ({pData.done} 완료)</p>
                                                                </div>
                                                                <div className="w-[80%] bar-track h-10 relative mt-1 transition-all group-hover:border-zinc-600">
                                                                    <div className={`absolute h-full bg-${pData.color}-500/10 rounded-lg overflow-hidden`} style={{ left: layout.left, width: layout.width }}>
                                                                        <div className={`h-full bg-${pData.color}-500 progress-bar relative shadow-[0_0_15px_rgba(var(--tw-colors-${pData.color}-500),0.4)]`} style={{ width: `${pData.percent}%` }}>
                                                                            {pData.percent === 100 && <span className="absolute right-2 top-2.5 text-xs text-white">✅</span>}
                                                                        </div>
                                                                    </div>
                                                                    {hasTasks && <span className="absolute -right-10 top-2.5 text-[10px] text-zinc-600 opacity-0 group-hover:opacity-100 transition-opacity">{isPhaseExpanded ? '▲' : '▼'}</span>}
                                                                </div>
                                                            </div>

                                                            {/* 상세 리스트 (3뎁스) */}
                                                            {isPhaseExpanded && hasTasks && (
                                                                <div className="ml-[20%] mt-3 mb-2 bg-[#08090a] border border-zinc-800 rounded-xl p-5 space-y-3 shadow-inner expand-anim">
                                                                    {pData.tasks.map((task, tIdx) => {
                                                                        const actualMins = calcActualMinutes(task["시작시간"], task["종료시간"]);
                                                                        const expectedMins = task["예상시간"] ? parseInt(task["예상시간"].replace(/[^0-9]/g, "")) : null;
                                                                        
                                                                        let timeDisplay = <span className="text-zinc-600 text-[10px]">시간 미기록</span>;
                                                                        if (actualMins !== null) {
                                                                            const isOverTime = expectedMins && actualMins > expectedMins;
                                                                            timeDisplay = (
                                                                                <span className="flex items-center gap-2 font-mono text-[10px]">
                                                                                    <span className="text-zinc-500 bg-zinc-800/50 px-2 py-1 rounded">예상 {task["예상시간"] || '-'}</span>
                                                                                    <span className={`px-2 py-1 rounded font-bold ${isOverTime ? 'bg-red-900/30 text-red-400' : 'bg-green-900/30 text-green-400'}`}>실제 {actualMins}분</span>
                                                                                </span>
                                                                            );
                                                                        }

                                                                        return (
                                                                            <div key={tIdx} className="flex justify-between items-center border-b border-zinc-800/40 pb-3 last:border-0 last:pb-0">
                                                                                <div className="flex items-center gap-3 w-2/3">
                                                                                    <span className="text-sm">{task.isDone ? '✅' : '🏃'}</span>
                                                                                    <span className="text-[10px] text-zinc-500 font-mono w-10 shrink-0">{getFormatDate(task["날짜"]||task["마감일"])}</span>
                                                                                    <span className={`text-xs truncate ${task.isDone ? 'text-zinc-600 line-through' : 'text-zinc-200'}`}>{task["내용"]}</span>
                                                                                </div>
                                                                                <div className="w-1/3 flex justify-end">{timeDisplay}</div>
                                                                            </div>
                                                                        );
                                                                    })}
                                                                </div>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        {/* 시니어 PO의 코칭 박스 */}
                                        <div className="mt-8 bg-[#050608] border border-emerald-900/50 rounded-2xl p-5 flex items-center gap-4">
                                            <span className="text-2xl bg-zinc-900 p-2 rounded-xl border border-zinc-800">🚀</span>
                                            <div>
                                                <p className="text-emerald-400 text-xs font-bold mb-1 tracking-widest uppercase">시니어 PO의 코칭</p>
                                                <p className="text-sm text-zinc-300">{getCoachingMessage(proj.currentDay)}</p>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            );

            // ==========================================
            // [VIEW 2] 일상/행정: 딜레이 트래커 뷰
            // ==========================================
            const renderLifeView = () => (
                <div className="space-y-6 animate-fade-in">
                    {projects.map((proj, idx) => {
                        const isAllDone = proj.totalPercent === 100 && proj.totalTasks > 0;
                        const hasDelay = proj.allTasks.some(t => t.isDelayed);
                        
                        // 포인트 컬러: 완료(초록), 딜레이있음(빨강), 진행중(노랑)
                        let pointColor = isAllDone ? "emerald" : hasDelay ? "red" : "yellow";

                        return (
                            <div key={idx} className={`glass-panel p-8 relative overflow-hidden transition-all ${isAllDone ? 'opacity-70 hover:opacity-100' : ''}`}>
                                {/* 좌측 포인트 컬러 바 */}
                                <div className={`absolute left-0 top-0 bottom-0 w-1.5 bg-${pointColor}-500`}></div>

                                <div className="flex justify-between items-start mb-6 pl-2">
                                    <div>
                                        <h2 className="text-2xl font-black text-white flex items-center gap-2 mb-1">
                                            {proj.name}
                                        </h2>
                                        <p className="text-xs text-zinc-500 font-mono">시작일: {proj.startDate}</p>
                                    </div>
                                    <div className="text-right">
                                        <span className={`bg-${pointColor}-500/20 text-${pointColor}-400 border border-${pointColor}-500/30 text-[11px] font-black px-3 py-1.5 rounded-lg shadow-sm`}>
                                            {isAllDone ? `🎉 ${proj.currentDay}일 만에 완료!` : `⏳ ${proj.currentDay}일째 진행 중`}
                                        </span>
                                    </div>
                                </div>

                                {/* 단일 진행률 바 */}
                                <div className="mb-6 pl-2">
                                    <div className="flex justify-between text-[10px] font-bold text-zinc-400 mb-2">
                                        <span>전체 진도율</span>
                                        <span className={`text-${pointColor}-400`}>{proj.totalPercent}% ({proj.totalDone}/{proj.totalTasks} 완료)</span>
                                    </div>
                                    <div className="w-full bar-track h-4 relative">
                                        <div className={`h-full bg-${pointColor}-500 progress-bar shadow-[0_0_15px_rgba(var(--tw-colors-${pointColor}-500),0.4)]`} style={{ width: `${proj.totalPercent}%` }}></div>
                                    </div>
                                </div>

                                {/* 상세 리스트 (딜레이 경고 포함) */}
                                {proj.totalTasks > 0 && (
                                    <div className="bg-[#08090a] border border-zinc-800 rounded-xl p-5 space-y-3 ml-2">
                                        {proj.allTasks.map((task, tIdx) => (
                                            <div key={tIdx} className={`flex items-center gap-3 border-b pb-3 last:border-0 last:pb-0 
                                                ${task.isDelayed ? 'border-red-900/30 bg-red-950/10 -mx-5 px-5 pt-3' : 'border-zinc-800/50 pt-1'}`}>
                                                
                                                <span className="text-sm">{task.isDelayed ? '🚨' : task.isDone ? '✅' : '🏃'}</span>
                                                <span className={`text-[10px] font-mono w-12 shrink-0 ${task.isDelayed ? 'text-red-500' : 'text-zinc-600'}`}>
                                                    {getFormatDate(task["날짜"]||task["마감일"])}
                                                </span>
                                                <span className={`text-sm flex-1 ${task.isDelayed ? 'text-red-100 font-bold' : task.isDone ? 'text-zinc-500 line-through' : 'text-zinc-200'}`}>
                                                    {task["내용"]}
                                                </span>
                                                
                                                {/* 🚨 딜레이 뱃지 */}
                                                {task.isDelayed && (
                                                    <span className="bg-red-600 text-white text-[9px] font-bold px-2 py-1 rounded shadow-[0_0_10px_rgba(220,38,38,0.5)] animate-pulse">
                                                        마감 {task.delayDays}일 지남!
                                                    </span>
                                                )}
                                                {/* 대기 중인 일 */}
                                                {!task.isDone && !task.isDelayed && !task["시작시간"] && (
                                                    <span className="text-[10px] text-zinc-600 font-mono">대기중</span>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            );

            // ==========================================
            // 메인 렌더링
            // ==========================================
            return (
                <div className="pb-20 w-full animate-fade-in">
                    {/* 최상단 탭 */}
                    <div className="flex gap-4 mb-10 overflow-x-auto pb-2">
                        {Object.keys(processedData).map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} 
                                className={`px-8 py-3 rounded-full font-black text-sm transition-all flex-shrink-0 ${activeTab === tab ? 'tab-active' : 'tab-inactive hover:bg-zinc-800'}`}>
                                {tab}
                            </button>
                        ))}
                    </div>

                    <header className="mb-10">
                        {isLifeView ? (
                            <>
                                <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 mb-2">
                                    Life & Admin Tracker
                                </h1>
                                <p className="text-zinc-500 text-sm">P1~P4의 복잡한 10일 전략 대신, 단일 진행률과 '마감일 지연(Delay)' 상태를 직관적으로 추적합니다.</p>
                            </>
                        ) : (
                            <>
                                <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
                                    Strategy Map
                                </h1>
                                <p className="text-zinc-500 text-sm">복잡한 기록들을 10일 전략으로 압축했습니다. 프로젝트를 클릭하여 상세 뷰를 확인하세요.</p>
                            </>
                        )}
                    </header>

                    {/* 엔진 분기 */}
                    {isLifeView ? renderLifeView() : renderStrategyView()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
