<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Start - Life Split Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #050505; font-family: 'Pretendard', sans-serif; color: white; }
        .glass-panel { background: #0f1115; border: 1px solid #1f2532; border-radius: 20px; transition: all 0.3s ease; }
        .glass-panel:hover { border-color: #2a313e; transform: translateY(-2px); }
        .bar-track { background: #18181b; border-radius: 6px; border: 1px solid #27272a; overflow: hidden;}
        .tab-active { background: #fff; color: #000; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .tab-inactive { background: #18181b; color: #71717a; border: 1px solid #27272a; }
        .progress-bar { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        ::-webkit-scrollbar { display: none; }
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body class="p-6 md:p-10 flex justify-center min-h-screen">
    <div id="root" class="w-full max-w-7xl"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SUPABASE_URL = "https://rcsicidesepmprytnyge.supabase.co";
        const SUPABASE_KEY = "sb_publishable_m5OZH8qVZdBD8N_EBYU3mw_L2AhObjN";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const getFormatDate = (dateStr) => {
            if (!dateStr) return "-";
            const date = new Date(dateStr);
            if (isNaN(date)) return dateStr;
            return `${String(date.getMonth() + 1).padStart(2,'0')}/${String(date.getDate()).padStart(2,'0')}`;
        };

        const App = () => {
            const [rawData, setRawData] = useState([]);
            const [activeTab, setActiveTab] = useState("");
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchData = async () => {
                    const { data, error } = await supabaseClient
                        .from('tasks') 
                        .select('날짜, 마감일, 대카테고리, 중카테고리, 내용, 완료여부, milestone, 예상시간, 시작시간, 종료시간');
                    if (error) console.error("Error:", error);
                    else setRawData(data || []);
                    setLoading(false);
                };
                fetchData();
            }, []);

            const processedData = useMemo(() => {
                if (rawData.length === 0) return {};
                const groups = {};
                const today = new Date();
                today.setHours(0,0,0,0);

                rawData.forEach(row => {
                    const big = row["대카테고리"] || "미분류";
                    const mid = row["중카테고리"] || "기타";
                    if (!groups[big]) groups[big] = {};
                    if (!groups[big][mid]) groups[big][mid] = { name: mid, tasks: [], earliestDate: null };
                    groups[big][mid].tasks.push(row);
                    const rowDate = new Date(row["날짜"] || row["마감일"]);
                    if (!isNaN(rowDate)) {
                        if (!groups[big][mid].earliestDate || rowDate < groups[big][mid].earliestDate) {
                            groups[big][mid].earliestDate = rowDate;
                        }
                    }
                });

                const result = {};
                for (const big in groups) {
                    result[big] = Object.values(groups[big]).map(proj => {
                        const start = proj.earliestDate || new Date();
                        let totalDone = 0;
                        const sortedTasks = proj.tasks.sort((a,b) => new Date(a["날짜"]||a["마감일"]) - new Date(b["날짜"]||b["마감일"])).map(task => {
                            const isDone = task["완료여부"] === 'O' || task["완료여부"] === 'o';
                            if (isDone) totalDone++;
                            let isDelayed = false;
                            if (!isDone && task["마감일"]) {
                                const due = new Date(task["마감일"]);
                                due.setHours(0,0,0,0);
                                if (due < today) isDelayed = true;
                            }
                            return { ...task, isDone, isDelayed };
                        });
                        const totalTasks = proj.tasks.length;
                        return {
                            name: proj.name,
                            startDate: start.toISOString().split('T')[0],
                            totalTasks,
                            totalDone,
                            totalPercent: totalTasks === 0 ? 0 : Math.round((totalDone/totalTasks)*100),
                            allTasks: sortedTasks
                        };
                    });
                }
                return result;
            }, [rawData]);

            useEffect(() => {
                const categories = Object.keys(processedData);
                if (categories.length > 0 && !activeTab) setActiveTab(categories[0]);
            }, [processedData, activeTab]);

            if (loading) return <div className="mt-40 text-center text-zinc-500 animate-pulse">데이터 로드 중...</div>;

            const projects = processedData[activeTab] || [];
            const ongoing = projects.filter(p => p.totalPercent < 100 || p.totalTasks === 0);
            const completed = projects.filter(p => p.totalPercent === 100 && p.totalTasks > 0);

            const renderProjectCard = (proj, color) => (
                <div key={proj.name} className="glass-panel p-5 relative overflow-hidden mb-4">
                    <div className={`absolute left-0 top-0 bottom-0 w-1 bg-${color}-500`}></div>
                    
                    <div className="flex justify-between items-start mb-4">
                        <div>
                            <h3 className="text-lg font-bold text-white mb-1">{proj.name}</h3>
                            <p className="text-[10px] text-zinc-500 font-mono">Started: {proj.startDate}</p>
                        </div>
                        <span className={`text-[10px] font-black px-2 py-1 rounded bg-${color}-500/10 text-${color}-400 border border-${color}-500/20`}>
                            {proj.totalPercent}%
                        </span>
                    </div>

                    <div className="w-full bar-track h-2 mb-4">
                        <div className={`h-full bg-${color}-500 progress-bar`} style={{ width: `${proj.totalPercent}%` }}></div>
                    </div>

                    <div className="space-y-2">
                        {proj.allTasks.slice(0, 5).map((task, i) => (
                            <div key={i} className="flex items-center gap-2 text-[11px]">
                                <span>{task.isDelayed ? '🚨' : task.isDone ? '✅' : '🏃'}</span>
                                <span className={`flex-1 truncate ${task.isDone ? 'text-zinc-600 line-through' : 'text-zinc-300'}`}>
                                    {task["내용"]}
                                </span>
                                <span className="text-zinc-600 font-mono text-[9px]">{getFormatDate(task["날짜"]||task["마감일"])}</span>
                            </div>
                        ))}
                        {proj.allTasks.length > 5 && (
                            <p className="text-[9px] text-zinc-600 text-center mt-2">+ {proj.allTasks.length - 5} more tasks</p>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="w-full animate-fade-in">
                    {/* 탭 메뉴 */}
                    <div className="flex gap-3 mb-10 overflow-x-auto pb-2">
                        {Object.keys(processedData).map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} 
                                className={`px-6 py-2.5 rounded-full font-bold text-xs transition-all flex-shrink-0 ${activeTab === tab ? 'tab-active' : 'tab-inactive hover:bg-zinc-800'}`}>
                                {tab}
                            </button>
                        ))}
                    </div>

                    <header className="mb-10">
                        <h1 className="text-3xl font-black text-white mb-2 tracking-tight">
                            Dual-Board Life Tracker
                        </h1>
                        <p className="text-zinc-500 text-sm">진행 중인 과업과 완료된 기록을 분리하여 관리합니다.</p>
                    </header>

                    {/* 메인 보드 레이아웃 */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 items-start">
                        
                        {/* Left Board: Ongoing */}
                        <section>
                            <div className="flex items-center justify-between mb-6 px-2">
                                <div className="flex items-center gap-3">
                                    <span className="w-2.5 h-2.5 rounded-full bg-yellow-500 pulse-dot"></span>
                                    <h2 className="text-xl font-black text-zinc-200 uppercase tracking-wider">In Progress</h2>
                                </div>
                                <span className="text-[10px] font-mono text-zinc-500 bg-zinc-900 px-2 py-1 rounded border border-zinc-800">
                                    {ongoing.length} Projects
                                </span>
                            </div>
                            
                            <div className="min-h-[400px]">
                                {ongoing.length > 0 ? (
                                    ongoing.map(proj => renderProjectCard(proj, "yellow"))
                                ) : (
                                    <div className="glass-panel p-10 text-center border-dashed border-zinc-800">
                                        <p className="text-zinc-600 text-sm">현재 진행 중인 프로젝트가 없습니다.</p>
                                    </div>
                                )}
                            </div>
                        </section>

                        {/* Right Board: Completed */}
                        <section>
                            <div className="flex items-center justify-between mb-6 px-2">
                                <div className="flex items-center gap-3">
                                    <span className="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
                                    <h2 className="text-xl font-black text-zinc-200 uppercase tracking-wider">Completed</h2>
                                </div>
                                <span className="text-[10px] font-mono text-zinc-500 bg-zinc-900 px-2 py-1 rounded border border-zinc-800">
                                    {completed.length} Projects
                                </span>
                            </div>

                            <div className="min-h-[400px] opacity-80 hover:opacity-100 transition-opacity">
                                {completed.length > 0 ? (
                                    completed.map(proj => renderProjectCard(proj, "emerald"))
                                ) : (
                                    <div className="glass-panel p-10 text-center border-dashed border-zinc-800">
                                        <p className="text-zinc-600 text-sm">아직 완료된 기록이 없습니다.</p>
                                    </div>
                                )}
                            </div>
                        </section>

                    </div>

                    {/* Footer Coaching */}
                    <footer className="mt-16 p-6 glass-panel border-blue-900/30 bg-blue-950/5">
                        <div className="flex items-center gap-4">
                            <span className="text-2xl">💡</span>
                            <div>
                                <p className="text-blue-400 text-xs font-bold uppercase tracking-widest mb-1">System Insight</p>
                                <p className="text-zinc-400 text-sm leading-relaxed">
                                    보드가 두 개로 나뉘면 뇌는 '끝내야 할 일'과 '이뤄낸 일'을 더 명확히 구분합니다. 
                                    좌측 보드를 비우고 우측 보드를 채우는 것에 집중하세요.
                                </p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
