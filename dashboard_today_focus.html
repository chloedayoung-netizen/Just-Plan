                                    <h2 className="text-sm font-bold text-zinc-500 mb-4 uppercase tracking-widest flex items-center gap-2">
                                        <span className="w-2 h-2 rounded-full bg-emerald-500"></span> Completed
                                    </h2>
                                    {boardProjects.filter(p => p.totalPercent === 100).map(proj => (
                                        <div key={proj.name} className="glass-panel p-5 relative overflow-hidden mb-4 opacity-60">
                                            <div className="absolute left-0 top-0 bottom-0 w-1 bg-emerald-500"></div>
                                            <h3 className="text-md font-bold text-white mb-2">{proj.name}</h3>
                                            <div className="w-full bar-track h-1.5 bg-emerald-500/20">
                                                <div className="h-full bg-emerald-500" style={{ width: '100%' }}></div>
                                            </div>
                                            <div className="mt-3 space-y-1.5">
                                                {proj.allTasks.slice(0, 2).map((task, i) => (
                                                    <div key={i} className="text-[10px] text-zinc-500 flex items-center gap-2">
                                                        <span>✅</span>
                                                        <span className="truncate flex-1 line-through">{task["내용"]}</span>
                                                        <span className="font-mono">{getFormatDate(task["날짜"] || task["마감일"])}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </section>
                            </div>
                        ) : viewMode === "strategy" ? (
                            <div className="space-y-5 expand-anim">
                                <div className="glass-panel p-6">
                                    <div className="flex flex-col lg:flex-row gap-4 lg:items-center lg:justify-between mb-4">
                                        <div>
                                            <h2 className="text-lg font-black text-white">{activeTab || "대카테고리"} 통합 현황</h2>
                                            <p className="text-xs text-zinc-500">V3 리스크 요약 + 대카테고리 간트 + V4 빠른추가</p>
                                        </div>
                                        <div className="flex gap-2 text-[11px]">
                                            <span className="px-2 py-1 rounded bg-yellow-500/10 text-yellow-300 border border-yellow-500/30">진행률 {majorProgress}%</span>
                                            <span className="px-2 py-1 rounded bg-amber-500/10 text-amber-300 border border-amber-500/30">미뤄짐 {majorDelayed}건</span>
                                            <span className="px-2 py-1 rounded bg-zinc-800 text-zinc-300 border border-zinc-700">{majorDone}/{majorTotal} 완료</span>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
                                        <div className="bg-black/30 border border-zinc-800 rounded-xl p-4">
                                            <div className="flex justify-between items-center mb-2">
                                                <div className="flex items-center gap-2">
                                                    <p className="text-[11px] font-bold text-zinc-400 uppercase tracking-widest">대카테고리 간트</p>
                                                    <button
                                                        onClick={() => setTopGanttMode("minor")}
                                                        className={`text-[10px] px-2 py-0.5 rounded border ${topGanttMode === "minor" ? 'border-yellow-500/40 text-yellow-300 bg-yellow-500/10' : 'border-zinc-700 text-zinc-500'}`}
                                                    >
                                                        중카테고리
                                                    </button>
                                                    <button
                                                        onClick={() => setTopGanttMode("phase")}
                                                        className={`text-[10px] px-2 py-0.5 rounded border ${topGanttMode === "phase" ? 'border-blue-500/40 text-blue-300 bg-blue-500/10' : 'border-zinc-700 text-zinc-500'}`}
                                                    >
                                                        P1~P4
                                                    </button>
                                                </div>
                                                <p className="text-[11px] font-mono text-zinc-500">{getFormatDate(majorStartDate)} - {getFormatDate(majorEndDate)}</p>
                                            </div>
                                            <div className="space-y-2">
                                                {topGanttMode === "minor" ? majorMinorStats.map((row) => (
                                                    <button
                                                        key={row.name}
                                                        onClick={() => focusProjectCard(row.name)}
                                                        className="w-full grid grid-cols-[120px_1fr_76px] gap-2 items-center text-left hover:bg-zinc-900/50 rounded-lg px-1 py-1 transition-colors"
                                                        title={`${row.name} 카드로 이동`}
                                                    >
                                                        <span className="text-[11px] text-zinc-400 truncate">{row.name}</span>
                                                        <div className="h-3 rounded-full bg-zinc-900 border border-zinc-800 overflow-hidden">
                                                            <div className={`h-full ${row.delayed > 0 ? 'bg-yellow-500' : 'bg-blue-500'}`} style={{ width: `${row.percent}%` }}></div>
                                                        </div>
                                                        <span className={`text-[10px] text-right ${row.delayed > 0 ? 'text-amber-400' : 'text-zinc-500'}`}>
                                                            {row.done}/{row.total}{row.delayed > 0 ? ` • 미뤄짐 ${row.delayed}` : ""}
                                                        </span>
                                                    </button>
                                                )) : majorPhaseStats.map((row) => (
                                                    <div key={row.p} className="grid grid-cols-[54px_1fr_54px] gap-2 items-center">
                                                        <span className="text-[11px] text-zinc-400 font-mono">{row.p}</span>
                                                        <div className="h-3 rounded-full bg-zinc-900 border border-zinc-800 overflow-hidden">
                                                            <div className="h-full bg-blue-500" style={{ width: `${row.percent}%` }}></div>
                                                        </div>
                                                        <span className="text-[10px] text-zinc-500 text-right">{row.done}/{row.total}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="bg-black/30 border border-zinc-800 rounded-xl p-4">
                                            <p className="text-[11px] font-bold text-zinc-400 uppercase tracking-widest mb-2">빠른 추가 (V4)</p>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mb-2">
                                                <select
                                                    value={quickTargetProject}
                                                    onChange={(e) => setQuickTargetProject(e.target.value)}
                                                    className="bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs"
                                                >
                                                    <option value="">중카테고리 선택</option>
                                                    {projects.map((p) => <option key={p.name} value={p.name}>{p.name}</option>)}
                                                </select>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setQuickMode("single")} className={`flex-1 text-[10px] px-2 py-1.5 rounded border ${quickMode === "single" ? 'border-emerald-500 text-emerald-300 bg-emerald-500/10' : 'border-zinc-700 text-zinc-500'}`}>단일</button>
                                                    <button onClick={() => setQuickMode("split")} className={`flex-1 text-[10px] px-2 py-1.5 rounded border ${quickMode === "split" ? 'border-blue-500 text-blue-300 bg-blue-500/10' : 'border-zinc-700 text-zinc-500'}`}>쪼개기</button>
                                                </div>
                                            </div>
                                            <input
                                                value={quickContent}
                                                onChange={(e) => setQuickContent(e.target.value)}
                                                className="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs mb-2"
                                                placeholder="빠르게 추가할 계획 내용을 입력하세요"
                                            />
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-2">
                                                <input type="date" value={quickDate} onChange={(e) => setQuickDate(e.target.value)} className="bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs" />
                                                <input type="date" value={quickDueDate} onChange={(e) => setQuickDueDate(e.target.value)} className="bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs" />
                                                <select value={quickMilestone} onChange={(e) => setQuickMilestone(e.target.value)} className="bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs">
                                                    <option value="P1">P1</option><option value="P2">P2</option><option value="P3">P3</option><option value="P4">P4</option>
                                                </select>
                                                <input value={quickExpected} onChange={(e) => setQuickExpected(e.target.value)} className="bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs" placeholder="예상시간" />
                                            </div>
                                            <button
                                                onClick={handleQuickAdd}
                                                disabled={quickSaving}
                                                className={`w-full text-[11px] font-bold py-2 rounded-lg border ${quickSaving ? 'border-zinc-700 text-zinc-500 bg-zinc-900' : 'border-emerald-500/40 text-emerald-300 bg-emerald-500/10'}`}
                                            >
                                                {quickSaving ? "추가 중..." : "빠른 추가 실행"}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                {projects.map((proj, idx) => {
                                    const tasks = proj.allTasks || [];
                                    const projectKey = getProjectKey(proj.name);
                                    const action = projectActions[projectKey];
                                    const form = projectForms[projectKey] || {};
                                    const chartMode = getChartMode(proj);
                                    const milestoneHeaders = ["P1", "P2", "P3", "P4"];
                                    const datedTasks = tasks
                                        .map((task, i) => ({ task, i, date: toDateOnly(task["날짜"] || task["마감일"]) }))
                                        .filter(item => item.date);
                                    const today = toDateOnly(new Date());
                                    const startDate = datedTasks.length > 0
                                        ? new Date(Math.min(...datedTasks.map(item => item.date.getTime())))
                                        : today;
                                    const endDate = datedTasks.length > 0
                                        ? new Date(Math.max(...datedTasks.map(item => item.date.getTime())))
                                        : startDate;
                                    const dayMs = 1000 * 60 * 60 * 24;
                                    const rangeDays = Math.max(1, Math.floor((endDate - startDate) / dayMs) + 1);
                                    const headers = Array.from({ length: rangeDays }, (_, dayIdx) => {
                                        const d = new Date(startDate);
                                        d.setDate(startDate.getDate() + dayIdx);
                                        return d;
                                    });
                                    const todayDate = toDateOnly(new Date());
                                    const todayOffset = Math.floor((todayDate - startDate) / dayMs);
                                    const todayInRange = todayOffset >= 0 && todayOffset < rangeDays;
                                    const todayLeft = `${((todayOffset + 0.5) / rangeDays) * 100}%`;
                                    const totalCols = chartMode === "date" ? rangeDays : 4;
                                    const isMilestoneMode = chartMode === "milestone";
                                    const selectedTaskId =
                                        selectedTaskByProject[projectKey] ||
                                        tasks.find(t => t.isDelayed)?.["ID"] ||
                                        tasks[0]?.["ID"] ||
                                        "";
                                    const selectedTask = tasks.find((t, i) => ((t["ID"] || `${proj.name}-${i}`) === selectedTaskId)) || null;

                                    return (
                                        <div
                                            key={idx}
                                            ref={(el) => { projectCardRefs.current[proj.name] = el; }}
                                            className={`glass-panel p-6 transition-all ${highlightedProject === proj.name ? 'ring-2 ring-yellow-400/80 shadow-[0_0_0_1px_rgba(250,204,21,0.3)]' : ''}`}
                                        >
                                            <div className="flex items-center justify-between mb-4">
                                                <h2 className="text-lg font-black text-white">{proj.name}</h2>
                                                <div className="flex items-center gap-2">
                                                    <div className="text-xs text-zinc-400 font-mono">
                                                        {getFormatDate(startDate)} - {getFormatDate(endDate)}
                                                    </div>
                                                    <div className="flex items-center gap-1 mr-1">
                                                        <button
                                                            onClick={() => setChartMode(proj.name, "date")}
                                                            className={`text-[10px] px-2 py-1 rounded border ${chartMode === "date" ? 'border-yellow-500/50 text-yellow-300 bg-yellow-500/10' : 'border-zinc-700 text-zinc-500'}`}
                                                        >
                                                            날짜
                                                        </button>
                                                        <button
                                                            onClick={() => setChartMode(proj.name, "milestone")}
                                                            className={`text-[10px] px-2 py-1 rounded border ${chartMode === "milestone" ? 'border-blue-500/50 text-blue-300 bg-blue-500/10' : 'border-zinc-700 text-zinc-500'}`}
                                                        >
                                                            마일스톤
                                                        </button>
                                                    </div>
                                                    <button onClick={() => openProjectAction(proj, "add")} className="text-[10px] px-2 py-1 rounded border border-emerald-600/40 text-emerald-300 bg-emerald-600/10">추가</button>
                                                    <button onClick={() => openProjectAction(proj, "edit")} className="text-[10px] px-2 py-1 rounded border border-blue-600/40 text-blue-300 bg-blue-600/10">수정</button>
                                                    <button onClick={() => openProjectAction(proj, "delete")} className="text-[10px] px-2 py-1 rounded border border-rose-600/40 text-rose-300 bg-rose-600/10">삭제</button>
                                                </div>
                                            </div>

                                            {action && (
                                                <div className="mb-4 p-3 rounded-xl border border-zinc-800 bg-black/30 space-y-3">
                                                    <div className="flex items-center justify-between">
                                                        <p className="text-[11px] font-bold text-zinc-300">
                                                            {action === "add" ? "계획 추가" : action === "edit" ? "계획 수정" : "계획 삭제"}
                                                        </p>
                                                        <button onClick={() => closeProjectAction(proj.name)} className="text-[10px] px-2 py-1 rounded border border-zinc-700 text-zinc-400">닫기</button>
                                                    </div>

                                                    {(action === "edit" || action === "delete") && (
                                                        <div>
                                                            <label className="block text-[10px] text-zinc-500 mb-1">대상 계획</label>
                                                            <select
                                                                value={form.targetTaskId || ""}
                                                                onChange={(e) => applySelectedTaskToForm(proj, e.target.value)}
                                                                className="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs"
                                                            >
                                                                <option value="">선택하세요</option>
                                                                {tasks.map((task) => (
                                                                    <option key={task["ID"]} value={task["ID"]}>
                                                                        {getFormatDate(task["날짜"] || task["마감일"])} | {task["내용"]}
                                                                    </option>
                                                                ))}
                                                            </select>
                                                        </div>
                                                    )}

                                                    {action !== "delete" && (
                                                        <>
                                                            <div className="flex items-center gap-2">
                                                                <button onClick={() => updateProjectForm(proj.name, { mode: "single" })} className={`text-[10px] px-2 py-1 rounded border ${form.mode !== "split" ? 'border-emerald-500 text-emerald-300 bg-emerald-500/10' : 'border-zinc-700 text-zinc-500'}`}>단일</button>
                                                                <button onClick={() => updateProjectForm(proj.name, { mode: "split" })} className={`text-[10px] px-2 py-1 rounded border ${form.mode === "split" ? 'border-blue-500 text-blue-300 bg-blue-500/10' : 'border-zinc-700 text-zinc-500'}`}>쪼개기</button>
                                                            </div>
                                                            <input
                                                                value={form.content || ""}
                                                                onChange={(e) => updateProjectForm(proj.name, { content: e.target.value })}
                                                                className="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs"
                                                                placeholder="계획 내용을 입력하세요"
                                                            />
                                                            <div className="grid grid-cols-2 gap-2">
                                                                <input type="date" value={form.date || ""} onChange={(e) => updateProjectForm(proj.name, { date: e.target.value })} className="bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs" />
                                                                <input type="date" value={form.dueDate || ""} onChange={(e) => updateProjectForm(proj.name, { dueDate: e.target.value })} className="bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs" />
                                                            </div>
                                                            <div className="grid grid-cols-2 gap-2">
                                                                <select value={form.milestone || "P1"} onChange={(e) => updateProjectForm(proj.name, { milestone: e.target.value })} className="bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs">
                                                                    <option value="P1">P1</option>
                                                                    <option value="P2">P2</option>
                                                                    <option value="P3">P3</option>
                                                                    <option value="P4">P4</option>
                                                                </select>
                                                                <input value={form.expected || ""} onChange={(e) => updateProjectForm(proj.name, { expected: e.target.value })} className="bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs" placeholder="예상시간 (예: 20분)" />
                                                            </div>
                                                        </>
                                                    )}

                                                    <div className="flex justify-end">
                                                        <button
                                                            onClick={() => submitProjectAction(proj)}
                                                            className={`text-[11px] font-bold px-3 py-1.5 rounded-lg border ${action === 'delete' ? 'border-rose-500/40 text-rose-300 bg-rose-500/10' : 'border-emerald-500/40 text-emerald-300 bg-emerald-500/10'}`}
                                                        >
                                                            {action === "add" ? "추가 실행" : action === "edit" ? "수정 실행" : "삭제 실행"}
                                                        </button>
                                                    </div>
                                                </div>
                                            )}

                                            <div className="overflow-x-auto">
                                                <div className="min-w-[760px] relative">
                                                    {chartMode === "date" && todayInRange && (
                                                        <div
                                                            className="absolute top-0 bottom-0 border-l border-dashed border-yellow-400/90 z-20 pointer-events-none"
                                                            style={{ left: `calc(220px + ${todayLeft})` }}
                                                        >
                                                            <div className="absolute -top-3 -translate-x-1/2 text-[9px] font-black bg-yellow-400 text-black px-1.5 py-0.5 rounded-full">TODAY</div>
                                                        </div>
                                                    )}

                                                    {chartMode === "date" ? (
                                                        <>
                                                            <div className="grid mb-1 text-[9px] text-zinc-600" style={{ gridTemplateColumns: `220px repeat(${totalCols}, minmax(0,1fr))` }}>
                                                                <div className="font-bold uppercase tracking-widest">Day</div>
                                                                {headers.map((_, i) => (
                                                                    <div key={i} className="text-center font-mono">D{i + 1}</div>
                                                                ))}
                                                            </div>
                                                            <div className="grid mb-2 text-[10px] text-zinc-500" style={{ gridTemplateColumns: `220px repeat(${totalCols}, minmax(0,1fr))` }}>
                                                                <div className="font-bold uppercase tracking-widest">Plan</div>
                                                                {headers.map((date, i) => (
                                                                    <div key={i} className="text-center font-mono">{getFormatDate(date)}</div>
                                                                ))}
                                                            </div>
                                                        </>
                                                    ) : (
                                                        <div className="mb-2 text-[10px] text-zinc-500 bg-zinc-900/50 border border-zinc-800 rounded-lg px-3 py-2">
                                                            카드 내부는 마일스톤 라벨을 각 행 좌측에 표시합니다.
                                                        </div>
                                                    )}

                                                    <div className="space-y-2">
                                                        {tasks.map((task, i) => {
                                                            const taskId = task["ID"] || `${proj.name}-${i}`;
                                                            const taskDate = toDateOnly(task["날짜"] || task["마감일"]) || startDate;
                                                            const milestoneIndex = Math.max(milestoneHeaders.indexOf(task["milestone"]), 0);
                                                            const offset = chartMode === "date"
                                                                ? Math.min(Math.max(Math.floor((taskDate - startDate) / dayMs), 0), rangeDays - 1)
                                                                : milestoneIndex;
                                                            const left = `${(offset / totalCols) * 100}%`;
                                                            const width = `${Math.max(100 / totalCols, 6)}%`;
                                                            const isSelected = selectedTaskId === taskId;
                                                            return (
                                                                <div
                                                                    key={taskId}
                                                                    onClick={() => setSelectedTaskByProject(prev => ({ ...prev, [projectKey]: taskId }))}
                                                                    className={`bg-zinc-950/50 border rounded-xl p-3 cursor-pointer transition-colors ${isSelected ? 'border-yellow-400/60 bg-yellow-400/5' : 'border-zinc-800 hover:bg-zinc-900/60'}`}
                                                                >
                                                                    <div className="flex items-center gap-2 mb-2">
                                                                        {isMilestoneMode && (
                                                                            <span className="text-[10px] font-black px-2 py-1 rounded bg-blue-500/10 text-blue-300 border border-blue-500/30 min-w-[34px] text-center">
                                                                                {task["milestone"] || "P1"}
                                                                            </span>
                                                                        )}
                                                                        <div className={`text-xs flex-1 truncate ${task.isDone ? 'line-through text-zinc-500' : task.isDelayed ? 'text-amber-200' : 'text-zinc-200'}`}>
                                                                            {task.isDelayed ? '📌 ' : task.isDone ? '✅ ' : '🏃 '}
                                                                            {task["내용"] || "내용 없음"}
                                                                        </div>
                                                                        <span className="text-[10px] font-mono text-zinc-500">{getFormatDate(task["날짜"] || task["마감일"])}</span>
                                                                        <div className="flex items-center gap-1">
                                                                            <button
                                                                                onClick={(e) => { e.stopPropagation(); handlePlayTask(task); }}
                                                                                disabled={playingTaskId === task["ID"]}
                                                                                className="px-2 py-1 rounded bg-emerald-600/20 text-emerald-300 border border-emerald-600/30 text-[11px] font-bold disabled:opacity-50"
                                                                            >
                                                                                {getTaskRunState(task) === "running" ? "완료" : getTaskRunState(task) === "done" ? "다시시작" : "재생"}
                                                                            </button>
                                                                            <button
                                                                                onClick={(e) => { e.stopPropagation(); handleSplitTask(task); }}
                                                                                disabled={splittingTaskId === task["ID"]}
                                                                                className="px-2 py-1 rounded bg-blue-600/20 text-blue-300 border border-blue-600/30 text-[11px] font-bold disabled:opacity-50"
                                                                            >
                                                                                쪼개기
                                                                            </button>
                                                                            <button
                                                                                onClick={(e) => { e.stopPropagation(); handleDeleteTask(task); }}
                                                                                className="px-2 py-1 rounded bg-rose-600/20 text-rose-300 border border-rose-600/30 text-[11px] font-bold"
                                                                            >
                                                                                지우기
                                                                            </button>
                                                                        </div>
                                                                    </div>

                                                                    <div className="relative h-7 bg-zinc-900 border border-zinc-800 rounded-lg overflow-hidden">
                                                                        <div className="absolute inset-0 flex">
                                                                            {Array.from({ length: totalCols }).map((_, hIdx) => (
                                                                                <div key={hIdx} className="flex-1 border-r border-zinc-800/60"></div>
                                                                            ))}
                                                                        </div>
                                                                        <div
                                                                            className={`absolute top-1 bottom-1 rounded-md ${task.isDone ? 'bg-emerald-500/70' : 'bg-blue-500/80'}`}
                                                                            style={{ left, width }}
                                                                        ></div>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="mt-4 p-3 bg-black/40 border border-zinc-800 rounded-lg text-xs text-zinc-300 grid grid-cols-2 gap-2">
                                                {!selectedTask ? (
                                                    <div className="col-span-2 text-zinc-500">선택된 계획이 없습니다.</div>
                                                ) : (
                                                    <>
                                                        <div>날짜: <span className="font-mono text-zinc-400">{getFormatDate(selectedTask["날짜"] || selectedTask["마감일"])}</span></div>
                                                        <div>마일스톤: <span className="font-mono text-zinc-400">{selectedTask["milestone"] || "-"}</span></div>
                                                        <div>예상시간: <span className="font-mono text-zinc-400">{selectedTask["예상시간"] || "-"}</span></div>
                                                        <div>진행상태: <span className="font-mono text-zinc-400">{getTaskRunState(selectedTask) === "running" ? "실행중" : getTaskRunState(selectedTask) === "done" ? "완료" : "대기"}</span></div>
                                                        <div>일정상태: <span className={`font-mono ${selectedTask.isDelayed ? 'text-amber-400' : 'text-zinc-400'}`}>{selectedTask.isDelayed ? `${selectedTask.delayDays}일 됐어요, 지금 시작!` : "정상"}</span></div>
                                                        <div>
                                                            {(() => {
                                                                const actualMins = calcActualMinutes(selectedTask["시작시간"], selectedTask["종료시간"]);
                                                                const expectedMins = selectedTask["예상시간"] ? parseInt(String(selectedTask["예상시간"]).replace(/[^0-9]/g, "")) : null;
                                                                if (actualMins === null) return <span className="font-mono text-zinc-500">실제시간 미기록</span>;
                                                                const isOverTime = expectedMins && actualMins > expectedMins;
                                                                return <span className={`font-mono ${isOverTime ? 'text-red-400' : 'text-emerald-400'}`}>실제 {actualMins}분</span>;
                                                            })()}
                                                        </div>
                                                        <div className="col-span-2">상세내용: <span className="text-zinc-200">{selectedTask["내용"] || "-"}</span></div>
                                                        <div className="col-span-2 mt-1">
                                                            <div className="text-[10px] text-zinc-500 mb-1">실행 로그</div>
                                                            {(() => {
                                                                const logs = getTaskRunLogs(selectedTask["ID"]);
                                                                const sessions = getTaskRunSessions(selectedTask["ID"]);
                                                                if (logs.length === 0) return <div className="text-[10px] text-zinc-600">기록 없음</div>;
                                                                return (
                                                                    <div className="space-y-1">
                                                                        {logs.slice().reverse().map((log, idx) => (
                                                                            <div key={idx} className="flex items-center justify-between text-[10px] border-b border-zinc-800/60 pb-1 last:border-0">
                                                                                <span className={`${log.action === 'complete' ? 'text-emerald-300' : 'text-blue-300'}`}>{log.action === 'complete' ? '완료' : '시작'}</span>
                                                                                <span className="font-mono text-zinc-400">{log.time || "-"}</span>
                                                                                <span className="font-mono text-zinc-500">{log.at ? getFormatDate(log.at) : "-"}</span>
                                                                            </div>
                                                                        ))}
                                                                        {sessions.length > 0 && (
                                                                            <div className="mt-2 pt-2 border-t border-zinc-800/60 space-y-1">
                                                                                {sessions.slice().reverse().map((s, sIdx) => (
                                                                                    <div key={sIdx} className="text-[10px] flex items-center justify-between">
                                                                                        <span className="text-zinc-500">세션 {sessions.length - sIdx}</span>
                                                                                        <span className="font-mono text-zinc-400">{s.start} - {s.end}</span>
                                                                                        <span className={`${s.durationMins !== null && s.durationMins > 0 ? 'text-emerald-300' : 'text-zinc-500'} font-mono`}>{s.durationMins !== null ? `${s.durationMins}분` : "-"}</span>
                                                                                    </div>
                                                                                ))}
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                );
                                                            })()}
                                                        </div>
                                                    </>
                                                )}
                                            </div>

                                            <div className="mt-5 bg-[#050608] border border-emerald-900/50 rounded-xl p-4 flex items-center gap-3">
                                                <span className="text-lg bg-zinc-900 px-2 py-1 rounded-lg border border-zinc-800">🚀</span>
                                                <div>
                                                    <p className="text-emerald-400 text-[10px] font-bold tracking-widest uppercase">코칭</p>
                                                    <p className="text-xs text-zinc-300">{getCoachingMessage(proj.currentDay)}</p>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        ) : (
                            <div className="space-y-5 expand-anim">
                                <div className="glass-panel p-6">
                                    <h2 className="text-lg font-black text-white mb-1">V2 하이브리드(조합안) 프리뷰</h2>
                                    <p className="text-xs text-zinc-500">v2.1 즉시 실행 + v2.2 핵심 인사이트를 운영 모드로 통합</p>
                                </div>

                                <div className="grid grid-cols-1 xl:grid-cols-3 gap-4">
                                    <div className="glass-panel p-4">
                                        <p className="text-[11px] text-zinc-500 mb-1">프로젝트 신호등</p>
                                        <p className="text-lg font-black">정상 {signal.ok} / 주의 {signal.warn} / 미뤄짐 {signal.danger}</p>
                                    </div>
                                    <div className="glass-panel p-4">
                                        <p className="text-[11px] text-zinc-500 mb-1">데일리 가드</p>
                                        <p className="text-lg font-black">{Math.floor((todayActualMins || todayExpectedMins) / 60)}h {(todayActualMins || todayExpectedMins) % 60}m / 6h</p>
                                        <div className="mt-2 h-2 rounded bg-zinc-900 border border-zinc-800 overflow-hidden">
                                            <div className="h-full bg-emerald-500" style={{ width: `${Math.min(Math.round(((todayActualMins || todayExpectedMins) / dailyCapacityMins) * 100), 140)}%` }}></div>
                                        </div>
                                    </div>
                                    <div className="glass-panel p-4">
                                        <p className="text-[11px] text-zinc-500 mb-1">예상시간 보정</p>
                                        <p className="text-lg font-black">중앙값 {medianDeltaMins >= 0 ? "+" : ""}{medianDeltaMins}분 제안</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
                                    <div className="glass-panel p-4">
                                        <div className="flex items-center justify-between mb-2">
                                            <p className="text-sm font-black">운영 패널 (v2.1 중심)</p>
                                            <span className="text-[10px] px-2 py-1 rounded border border-zinc-700 text-zinc-400">실행용</span>
                                        </div>
                                        <div className="space-y-2 text-sm">
                                            {majorMinorStats.slice(0, 5).map((row) => (
                                                <div key={row.name} className="flex items-center justify-between border-b border-zinc-800 pb-2 last:border-0">
                                                    <span className="truncate">{row.name}</span>
                                                    <span className={`text-[11px] px-2 py-1 rounded ${row.delayed > 0 ? 'bg-amber-500/10 text-amber-300' : row.percent < 60 ? 'bg-yellow-500/10 text-yellow-300' : 'bg-emerald-500/10 text-emerald-300'}`}>
                                                        {row.delayed > 0 ? "미뤄짐" : row.percent < 60 ? "주의" : "정상"}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="mt-3 text-xs text-zinc-400">데일리 시간 사용 {Math.floor(todayExpectedMins / 60)}h {todayExpectedMins % 60}m / 6h</div>
                                    </div>

                                    <div className="glass-panel p-4">
                                        <div className="flex items-center justify-between mb-2">
                                            <p className="text-sm font-black">데드라인 + 의존성 경고</p>
                                            <span className="text-[10px] px-2 py-1 rounded border border-zinc-700 text-zinc-400">v2.2 일부 선반영</span>
                                        </div>
                                        <div className="space-y-2">
                                            {upcomingDeadlines.length === 0 && <div className="text-xs text-zinc-500">7일 내 임박 작업 없음</div>}
                                            {upcomingDeadlines.map((task) => {
                                                const due = toDateOnly(task["마감일"] || task["날짜"]);
                                                const dday = due && todayDateOnly ? Math.floor((due - todayDateOnly) / majorDayMs) : null;
                                                return (
                                                    <div key={task["ID"]} className="flex items-center justify-between border-b border-zinc-800 pb-2 last:border-0">
                                                        <span className="text-xs truncate">{task["내용"]}</span>
                                                        <span className="text-xs text-zinc-400">{dday !== null ? `D-${dday}` : "-"}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        <div className="mt-3 text-xs">
                                            <span className="text-zinc-500 mr-2">의존성 상태</span>
                                            <span className={`px-2 py-1 rounded ${depWarningCount > 0 ? 'bg-red-500/10 text-red-300' : 'bg-emerald-500/10 text-emerald-300'}`}>
                                                {depWarningCount > 0 ? `선행 미완료 경고 ${depWarningCount}건` : "정상"}
                                            </span>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
                                    <div className="glass-panel p-4">
                                        <div className="flex items-center justify-between mb-3">
                                            <p className="text-sm font-black">통합 타임라인 (미니맵 제외)</p>
                                            <span className="text-[10px] px-2 py-1 rounded border border-zinc-700 text-zinc-400">v2.2</span>
                                        </div>
                                        <div className="space-y-3">
                                            {timelineRows.map((row) => (
                                                <div key={row.name} className="grid grid-cols-[120px_1fr_92px] gap-2 items-center text-xs">
                                                    <span className="truncate text-zinc-300">{row.name}</span>
                                                    <div className="relative h-4 rounded bg-zinc-900 border border-zinc-800 overflow-hidden">
                                                        <div className="absolute top-[2px] bottom-[2px] rounded bg-gradient-to-r from-blue-500 to-emerald-500" style={{ left: row.left, width: row.width }}></div>
                                                        {majorTodayInRange && (
                                                            <div className="absolute top-0 bottom-0 border-l border-dashed border-yellow-300" style={{ left: majorTodayLeft }}>
                                                                <span className="absolute -top-4 -translate-x-1/2 text-[9px] font-black bg-yellow-300 text-black px-1 py-[1px] rounded">TODAY</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                    <span className="font-mono text-zinc-500 text-right">{row.period}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="glass-panel p-4">
                                        <div className="flex items-center justify-between mb-2">
                                            <p className="text-sm font-black">기간 리포트 + 실행로그 DB</p>
                                            <span className="text-[10px] px-2 py-1 rounded border border-zinc-700 text-zinc-400">v2.1</span>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2 text-xs">
                                            <div className="rounded border border-zinc-800 p-3 bg-black/20">
                                                <div className="text-zinc-500">최근 7일 완료율</div>
                                                <div className="text-lg font-black mt-1">{recentRate}%</div>
                                            </div>
                                            <div className="rounded border border-zinc-800 p-3 bg-black/20">
                                                <div className="text-zinc-500">미뤄진 건</div>
                                                <div className="text-lg font-black mt-1">{recentDelayed}건</div>
                                            </div>
                                            <div className="rounded border border-zinc-800 p-3 bg-black/20">
                                                <div className="text-zinc-500">예상 vs 실제</div>
                                                <div className="text-lg font-black mt-1">{medianDeltaMins >= 0 ? "+" : ""}{medianDeltaMins}분</div>
                                            </div>
                                            <div className="rounded border border-zinc-800 p-3 bg-black/20">
                                                <div className="text-zinc-500">실행 로그(누적)</div>
                                                <div className="text-lg font-black mt-1">{runLogsCount}건</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="glass-panel p-4">
                                    <div className="flex items-center justify-between mb-2">
                                        <p className="text-sm font-black">오늘 카테고리별 해야할 일</p>
                                        <span className="text-[10px] px-2 py-1 rounded border border-zinc-700 text-zinc-400">실행 후 다음 작업 표시</span>
                                    </div>
                                    <div className="space-y-2">
                                        {todayTasksByProject.length === 0 && (
                                            <div className="text-xs text-zinc-500">오늘 일정이 없고, 다음 작업 후보도 없습니다.</div>
                                        )}
                                        {todayTasksByProject.map((row) => (
                                            <details key={row.name} open className="rounded-lg border border-zinc-800 bg-black/20 p-2">
                                                <summary className="cursor-pointer flex items-center justify-between text-xs font-bold">
                                                    <span>{row.name}</span>
                                                    <span className={`px-2 py-0.5 rounded text-[10px] ${row.delayed ? 'bg-amber-500/10 text-amber-300' : 'bg-emerald-500/10 text-emerald-300'}`}>
                                                        {row.delayed ? "미뤄짐" : "진행 중"}
                                                    </span>
                                                </summary>
                                                <div className="mt-2 space-y-1 text-xs">
                                                    {row.todayList.filter((t) => t.isDone).map((t) => (
                                                        <div key={`done-${t["ID"]}`} className="grid grid-cols-[20px_1fr_40px] gap-2 items-center opacity-60 line-through">
                                                            <span>✅</span><span>{t["내용"]}</span><span className="text-right">완료</span>
                                                        </div>
                                                    ))}
                                                    {row.nextTask && (
                                                        <div className="grid grid-cols-[20px_1fr_40px] gap-2 items-center border border-blue-500/40 rounded px-2 py-1 bg-blue-500/10">
                                                            <span>▶</span><span>{row.nextTask["내용"]}</span><span className="text-right">다음</span>
                                                        </div>
                                                    )}
                                                    {row.waiting.map((t) => (
                                                        <div key={`wait-${t["ID"]}`} className="grid grid-cols-[20px_1fr_40px] gap-2 items-center">
                                                            <span>○</span><span>{t["내용"]}</span><span className="text-right text-zinc-500">대기</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </details>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Floating Action Button */}
                    <button
                        onClick={() => setIsModalOpen(true)}
                        className="fixed bottom-10 right-10 fab-gradient px-8 py-4 rounded-full font-black text-white shadow-2xl hover:scale-105 transition-transform flex items-center gap-3 z-40"
                    >
                        <span className="text-xl">✨</span> AI로 새 프로젝트 시작
                    </button>

                    {/* AI Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 modal-overlay">
                            <div className="glass-panel w-full max-w-lg p-8 shadow-[0_0_50px_rgba(0,0,0,0.5)] relative">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-6 right-6 text-zinc-500 hover:text-white text-xl">✕</button>

                                <div className="mb-8">
                                    <h2 className="text-2xl font-black text-white mb-2">AI Project Architect</h2>
                                    <p className="text-zinc-500 text-sm">목표를 입력하면 AI가 10일간의 실행 전략을 설계합니다.</p>
                                </div>

                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">Gemini API Key</label>
                                        <input
                                            type="password"
                                            value={apiKey}
                                            onChange={(e) => setApiKey(e.target.value)}
                                            className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                                            placeholder="Google AI Studio에서 발급받은 키를 입력하세요"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">Your Goal</label>
                                        <textarea
                                            value={aiGoal}
                                            onChange={(e) => setAiGoal(e.target.value)}
                                            className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-sm h-32 focus:ring-2 focus:ring-emerald-500 outline-none transition-all resize-none"
                                            placeholder="예: 2주 안에 리액트 포트폴리오 완성하기, 토익 800점 달성하기 등"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">대카테고리</label>
                                        <select
                                            value={majorCategorySelect}
                                            onChange={(e) => {
                                                setMajorCategorySelect(e.target.value);
                                                setMinorCategorySelect("");
                                                setMinorCategoryCustom("");
                                            }}
                                            className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                                        >
                                            <option value="">선택하세요</option>
                                            {majorCategoryOptions.map((cat) => (
                                                <option key={cat} value={cat}>{cat}</option>
                                            ))}
                                            <option value={CUSTOM_OPTION}>직접 입력</option>
                                        </select>
                                        {majorCategorySelect === CUSTOM_OPTION && (
                                            <input
                                                type="text"
                                                value={majorCategoryCustom}
                                                onChange={(e) => setMajorCategoryCustom(e.target.value)}
                                                className="mt-2 w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                                                placeholder="대카테고리를 직접 입력하세요"
                                            />
                                        )}
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">중카테고리</label>
                                        <select
                                            value={minorCategorySelect}
                                            onChange={(e) => setMinorCategorySelect(e.target.value)}
                                            className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                                        >
                                            <option value="">선택하세요</option>
                                            {minorCategoryOptions.map((cat) => (
                                                <option key={cat} value={cat}>{cat}</option>
                                            ))}
                                            <option value={CUSTOM_OPTION}>직접 입력</option>
                                        </select>
                                        {minorCategorySelect === CUSTOM_OPTION && (
                                            <input
                                                type="text"
                                                value={minorCategoryCustom}
                                                onChange={(e) => setMinorCategoryCustom(e.target.value)}
                                                className="mt-2 w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                                                placeholder="중카테고리를 직접 입력하세요"
                                            />
                                        )}
                                    </div>

                                    <button
                                        onClick={handleAISplit}
                                        disabled={isGenerating}
                                        className={`w-full py-5 rounded-2xl font-black text-sm transition-all ${isGenerating ? 'bg-zinc-800 text-zinc-500' : 'fab-gradient text-white hover:opacity-90'}`}
                                    >
                                        {isGenerating ? (
                                            <span className="flex items-center justify-center gap-3">
                                                <span className="w-4 h-4 border-2 border-zinc-500 border-t-white rounded-full animate-spin"></span>
                                                AI가 전략을 짜는 중...
                                            </span>
                                        ) : "전략 설계 시작하기"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
